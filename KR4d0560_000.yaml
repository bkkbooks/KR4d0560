body:
  text: 江月松風集别集類四元提要臣等謹案江月松風集十二卷元錢惟善撰惟善字思復自號心白道人錢塘人領至正辛巳鄉薦官至副提舉張士誠據吳退隱吳江又移居華亭明洪武初卒惟善博學強記初應鄉試時題曰羅剎江賦鎖院三千人不知出處獨惟善引枚乘七發證錢唐之曲江即羅剎江按枚乘稱廣陵之曲江則觀潮當在揚州後人謂漢時廣陵地廣遂以錢唐之潮當之殊為附會惟善此賦蓋亦沿舊説之誤不足為據謹附訂於此大為主司所稱由是知名其集在明不甚顯故焦竑撰國史經籍志收元人詩集頗夥而惟善所作不著録其傳於世者惟賴良大雅集所録詩九首而已此本初為惟善手書真迹藏於練川陸氏後歸嘉興曹溶康熙中金侃於溶家抄得又以甫里許氏所藏本互相參證始繕為此編流傳於世顧嗣立元詩選所録即據此編採入者也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:117a2d081421880dbdf9589e9e9f62bcfcebc39a35c702c5e22da65f687ad0c2
