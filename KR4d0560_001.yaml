body:
  text: 江月松風集卷一元錢惟善撰古詩二首鳯麟别千載騷雅流餘聲南入蒼梧天鴻雁雝雝鳴騁目江上秋秋雲白英英扣舷欲何之山水遺韶韺白馬㡬朝夕震盪赤帝闕不洗鴟夷魂千年屬鏤血我欲騎赤蚪東上探禹穴手披青玉書逍遥弄明月送韓介石之平江財賦提舉分韻得館娃宫吳宫沒花草千年㳺鹿麋薌徑空陳迹琴臺餘故基雲木薆秀峰秋蒓生廢池湖波澹空碧扁舟想鴟夷伊人已云逺逸駕誰能追可憐當時樂徒令後來悲今君賦逺游登覽却蛾眉青楓莫天濶曠望瓊琚辭次韻負郭豈無資躬耕樂田野交交桑扈鳴好雨光風灑扣角長夜歌荷蓑卧牛下曉行隴畝間新水沒秧馬我聞行路難自古多轗軻五栁風翛翛牀頭酒初熟萬事不挂懐敝屣視金屋長嘯歌逺遊瞻彼嶽之麓餐霞飲沆瀣逝將老雲谷懐李坦之懐哉謫仙人白駒在雲谷𤣥風不可攀髙枝㺯黃鵠馮湖望西山爽氣照書屋間賦招隠篇悠然逺榮辱勸我以浮白贈我以結緑落日錢塘江呑聲空注目閉門客不來長歌飯黄犢對月酌酒對月不飲酒何以陶吾生明輝散空白照我千載情泠然輙忘寐但覺風露清寒蛩襍羣籟天地皆秋聲流光不可駐長江終夜鳴酒盡月欲堕浩歌倚層城陪吳叔勝諸君吳山小飲客有期不至者作詩貽之分得人字限十韻晴嵐欎孤翠幽亭萃嘉賔維時風日美適目江山新鳴絃調初夏擷芳惜餘春息景在茂樹俯淵窺潜鱗雍雍文字飲楚楚尊爼陳徳馨幽蘭佩石澗蒼苔䄄清賞暫消摇素期非隠淪黄鳥鳴吾傍嚶嚶若懐人百年㡬良㑹緬兹寂寞濵披拂松雲下結廬行卜鄰松聲樓為行可仕上人賦南山多巨松空翠拂靈石根蟠茯苓脂寒凝一泓碧結樓附清隂下有雲半席天籟發蚪髯神光生琥珀馮虚奏韶濩震霆鼓潮汐猛若鐵騎奔銜枚襲空壁悄若鶴在隂仙音飛九澤嫋嫋如有情泠泠寂無迹道人了不聞落月滿樓白送酸齋學士之西川薊北文章客風流逈不羣潮聲秋别夢月色夜留君三峽吞秦樹千峰抹楚雲形骸捐水石來往更殷勤山村輓詞詩窮八十年江海正凄然玉麈風生頰青山雪滿顛門墻張籍俊墓表孟郊賢出處人皆識哀歌徹九泉送沈敬叔之建徳次王性存韻惜别風花急喚愁江草新鱸魚肥可釣鷗鳥靜相親月轉星灘夜潮廽漁浦春贈行無好句家訓足書紳湖居負郭輪蹄逺殘春櫻筍佳湖天翻白浪山日黯黄霾夢蝶烏皮儿觀魚畵舫齋何人契幽賞髙致到無懷中秋見月懷故人海月大如斗江雲明似霞秋聲歸絡緯暮色起蒹葭席散金蟾彩衣浮玉露華更深望牛女安得挂星槎送洪安道歸睦并簡洪君寔講徹西湖席梅邊袂欲分明經期董子采藥訪桐君畎畝經綸手江山錦繡文青溪回首處長嘯倚松雲靈璧手印篇有序漢以江都王女細君嫁烏孫王女過靈璧嘗扶以石後人鐫石為模腕節分明故述其事而為之辭漢香飛入烏孫國踰白龍堆行絶域萬里窮愁天一方曾駐鳴鑣倚靈璧靈璧亭亭立空雪石痕不爛胭脂節神颷吹影髙撩秋堤雲欲補中原月穹廬作室墻以旃佩環魂託胡歌傳當時雙泪洒成血血成碧色苔花堅青塜相望去不歸歸時定化黃鵠飛千年恨隔氊城夢漢使者過空霑衣王氏節婦詩有序丙子歳天台王氏妻為兵所掠至嵊縣青楓嶺嚙指題五十六字石上投滹江而死迄今血書宛然泰定初邑徐丞始上其事請立廟旌之晉張仲舉首唱作詩一章邀好事者同賦又聞丙子間襄陽賈尚書兒婦韓魏公五世孫也岳州破被擄之明日以衣帛嚙指書長詩渡江中流自溺而死其詩多有可稱者有江南無謝安塞北有王猛之句士大夫咸膾炙之因感其節同其事類故并及之云昔聞江南賈尚書兒嫓韓氏身塟魚嘗以血濺雲錦襦至今波蕩青瓊琚嚙指堂堂丈夫氣乃見蒼茫甲兵際倚舷不忍渡中流翻然直向龍宫遊嗟嗟赤城王氏妻青楓嶺滑愁雲低滹江水黑幽魂啼峭壁萬仭無由梯望夫不來歸路迷石痕雨碧風凄凄君臣失國時所偶兒女䘮我家何有丹精貫日昭不朽朝廷立廟滹江口荆揚孰謂風俗媮嗚呼貞節無與儔二女允也忠義流他年太史須編收八月十五夜風雨後見月有懐天柱峰頭月華碧自古人間風雨隔飄然砍探蟾窟游萬里隂霾妬良夕𤣥雲忽開黃道明顧兎涵秋抱氷魄嫦娥偷藥常少年桂子薌霏羽衣濕飛仙挾我凌太清萬丈寒光湛虚白美人不來空夜凉白紵歌闌露花積登五雲山普覺遺衣久不傳五雲故色尚蒼然斷崖蘿薜三千丈喬木風霜四百年龍井雨深泉獨厚漁村潮上月初圓寳坊金碧紅塵聚何以兹山更絶縁永昌王傅長丈杜伯誠還西凉索賦時伯誠以王命收書使星光動斗牛精黼黻文章禮樂成青海昔為傳箭地玉闗今有讀書聲東探禹穴千年迹西望秦雲萬里情充棟汗牛寧衒富要期多士答昇平九日鳯池小集分韻得花字寂寂禪宫一徑賖傷心摇落异繁華錦池冷浸鳳皇影畵壁秋生苔蘚花九日江山又風雨百年臺殿自烟霞徘徊快拭登臨目更約西湖泛釣槎送曹克明員外之湖廣省錢唐西望武昌城天際飛艎㡬日程三峽波濤下江漢九嶷雲霧接巫衡笑談落落蕭曹佐登覽蒼蒼屈宋情更把文風變丹徼不須銅柱紀南征送陳續古之㑹稽教諭負笈西遊未十年絶江又泛剡溪船碧窗夜靜雲分榻綘帳春吟雪滿氊人憶蘭亭晉文物神留玉筍禹山川知君懷古登臨處喬木蒼烟思渺然送丘以敬淮海山長中州文學振家聲英妙當年月旦評鶚薦早登賔貢選龍飛得被聖恩榮月明潮落金山寺雪盡江缺鐵甕城弦誦洋洋徧淮海憑髙懷古有餘情題杜甫麻鞋見天子圖四郊多壘未還鄉又别潼闗謁鳳翔九廟君臣同辟難十年弟妹各殊方中原百戰洗兵甲萬里一身愁虎狼寂寞當時窮獨叟按圖懷古恨茫茫分韻送諸暨胡允文登瀛藉甚冠多士入剡蕭然訪故人埜雪推篷休汎夜樵風傾葢穏行春破琴獨羡戴安道衣錦孰如朱買臣招隠歌闌却乗興濯纓時復過谿濵久旱聞丞相禱雨上竺喜而賦詩海霞炎日火流金萬里蒼旻不肯隂山澤那無作霖意雲霓未得憫農心西湖夜熱波猶沸南土秋乾雨不淫林下何人坐忘寐短檠賦罷碧窗深方養心自廬山歸時傳養心已仙去故以丁令威嘲之萬里扁舟拂釣磯琵琶空怨不霑衣廬山正想陸修靜華表忽聞丁令威種杏豈無髙士隠巢松曾有謫仙歸月明夢到西江上五老峰前白鶴飛奉和左轄吳公禱雨天目山有感乾坤亢旱兵塵後廊廟憂深畎畝間千里西成望甘澤百靈前導謁名山清秋雲雨蛟龍窟白日雷霆虎豹闗俄頃神功廻造化作霖未許老臣閑次韻答仲臣梁君説詩久不來匡鼎千里月明歸思遲南國詞臣空擬些東闗逆旅漫歌噫無才我乏瓊瑶報有志君㸔禮樂施安得錦箋三百幅便風日日寄相思喜得家報昨夜燈花今夜書西湖歸夢緑隂初吟邊欲寫留春意呼酒旋烹雙鯉魚雪夜水鏡氷凝玉萬家有人和雪嚼梅花夜闌酒醒歌招隠欲喚扁舟向若耶又凌室冲冲已鑿氷兩峰髙聳玉稜層漁郎睡熟蘆花被冷照篷窻雪一燈過清壑雲扉用吾子行留題韻縣壁削青雲繞扉挂藤走翠石鈎衣洞簫聲逺人何處風送岩花撲面飛題髙彦敬竹石又序彦敬自䟦云草窻出謬紙一幅就破研完僧筆磨臭膠墨命寫竹頼有紅酒一尊少助浩然之氣故有此君子不可轉之妙態校官仇山村屠月汀鄧匪石今歸之吳子靜子靜乃草窗外孫故及之石似於烏檡徒竹似槎於檡虎也尚書醉墨洒流霞弁陽寳繪今餘㡬片紙清風想外家四月十九日與索木魯子昇登雷峰墖百轉鶯聲兩部蛙不知春色在天涯緑隂千里飛紅雨濯錦江邊正浣花送王君寔赴臺都事并序行省都事王公君寔近除南臺都事宸翰所定也將行求餞章其人天性至孝以親喪未𦵏不茹葷酒者十有七年省臺交章史館立傳起身憲府書吏兩任亷司知事以河南都事而為南臺監察御史以江浙都事而有是除所至以亷能清直見稱翠埽蛾眉蹴浪花江山乗傳挹清華羽儀要路叅䑓閣骨鯁平生相國家傳列太常旌孝友班聫御史削奸邪遥知案牘無塵務簾捲芙蓉晝煮茶江月松風集卷一
