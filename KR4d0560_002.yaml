body:
  text: 江月松風集卷二元錢惟善撰故宫春望次平禹成韻登臨休賦黍離章千里江流接大荒劍鎖血華空楚舞鏡埋香骨失秦粧薜蘿山鬼啼螢苑荆棘銅駝卧鹿場寂寞萬年枝上月夜深猶照舊宫墻久雨大風二首蒼生愁暑雨甲子變秋霖風自四方至雲從六月隂聞雞休舞劍聽雁欲霑襟渺渺江湖夢區區畎畝心東南稱樂土旱潦異中原淫雨憂天漏顛風畏海翻旱禾登越甸秋水漫吳門學道甘清苦翛然愧飽溫懷師魯國賔二君子讀書燈火似秋涼夢筆還成五色章風雨雞鳴君莫舞江湖魚樂我相忘清談常想東西席髙卧何須上下牀他日逺來山水窟苔花如雪扣漁榔奎章典籖逹兼善除南臺監察御史因寄小詩奉賀并簡大龍翔笑隱長老風雨雞聲起夜闌相思欲寄翠琅干校讐東壁圖書府搏擊南臺耳目官萬里江行過采石九重天語出金鑾他年了却埋輪志芋火山中對懶殘送趙季文侍嚴君心逺公官浙東帥府江驛霜晴木葉乾庭闈正喜共之官山中圖史隨賔幕海上旌旗擁帥壇島賈獻琛兼百粵秦兒采藥渺三韓知君覽勝登天姥定駕長風振羽翰和沈若水山居韻誰識山中隱者廬白雲無路問樵夫間將槲葉紉衣佩靜試蓮花刻漏壺入海已憐方士拙卧雲偏羡列仙癯甕頭春色多藏酒更有琴書足自娛送吉甫赴江西省同考試楚士如雲集豫章百年文物自歐陽雕蟲未足追騷雅相馬當知出牝黃寶劔徹天占太史亦作晉相朱簾捲雨宴滕王此行身價南金重要貢真材作棟梁早發葑門得風直抵皂林泊白龍廟前風浪生扁舟初離闔閭城嬋娟霜月雁千里顛倒衣裳雞五更櫓答漁歌江入夢帆迎野色樹移城葦間何限秋蕭瑟愁絶胡笳出塞聲寄題邢氏清寧樓唐微天師題扁縱目東南極杳冥乾坤萬里正清寧檻憑江樹霏煙雨簾捲淮波蕩月星賔宴仍招古藤客仙書聊憶紫陽銘秋風三疊詞難和樓上居人本姓邢述懷倦遊湖海十年餘人物如雲想國初貞觀名臣重房杜建安才子數應徐聞雞起舞關河壯射虎歸來事業疏便欲巢雲尋五老短檠依舊滿床書送故朱俊卿安厝定山斗門埋玉空山巷不歌春暉精舍鬱嵯峨籜龍頭角驚雷雨木客衣裳雜薜蘿入樹雲霏千點翠出溪泉涌半江波懷人俯仰成陳迹漫憶蘭亭紀永和送南泉隂陽教授許存古北上南遊千里宦桐城春滿錢唐衣繡榮禹穴藏書期太史客星犯斗覔君平驛晴馬上看山色江夜燈前聼雨聲折栁不堪容易别望雲心逺定懸旌送浙江憲掾王庭訓遷江西長西挂席向洪都憲幕諸郎喜有儒雕鶚九霄同奮擊鵾鵬六月快摶扶學傳齊魯文無害詩到匡廬興不孤草色緑波天共逺尊前莫忘唱吳歈宫詞二首和符安理鎮撫韻放生池上月沉鈎掖樹如雲易得秋鐘動景陽梳洗早轆轤聲轉井幹樓夢驚鴛瓦落宫墻殿鎖長秋怨夜涼教授後庭今白髮舊時博士漢披香題兩童牧二牛圖齊侯聞飯牛黃帝問牧馬二竪真若人三生已忘我應無醉尉呼莫止宿亭下遲遲髙栁隂解衣盤礴裸杏花等鶯期燕引遊蜂知隔垂楊第幾重壇近緇帷忘晝永宫催羯鼓助春濃綘煙輕潤香鬚裊紅雪乾圓粉泪溶寂寞曲江人不見貞元朝士憶時雍次彥清韻送斯道葛洪有約遊天竺惠逺無心過石橋溪樹鎖青嵐雨霽湖風皺碧岸氷銷忘形野老時分席洗耳山人昔挂瓢橫碧齋西夢泉上春猿秋鶴定相招送魯子升作吏能忘勢逢人每説詩同庚慚我長莫逆受君知語輒傾肝膽情難慰别離江湖還有夢風雨豈無期即事壺隱初逃谷樓居欲近江攤書山繞席岸幘月臨窗白鳥汙秋箑青蟲撲夜釭蕭然無物纍靜勝此心降題賈治安同知秋林平逺圖軒蓋昂昂五大夫傲然下晲石烏檡扁舟人似青山瘦折簡從來不可呼送月彥明之台録事司宣差入政裁煩劇承恩擢俊髦窗藝堆舊笈宫錦置新袍台嶺連天姥霞城枕海濤絃歌有餘暇送目到金鰲送陳子敬王子仁倦遊年少滯江南憂患驚心百不堪韶海有人遺白葛洞庭無客寄黃柑涼風拂衽聼喉轉夜雨移燈覆手談寂寞嵗寒梅共我月明索笑碧雲簷書金字經二首旃檀香滿梵王居丞相旌旄映使車四十二章傳貝葉五千餘卷集金書當年鹿苑無文字後世龍龕校魯魚要與石經同不朽河清海晏太平初羲獻能書稱異代騰蘭傳法度流沙天香字字融金液雲錦重重疊寶華了義何須談般若前身我亦寫楞伽儼然似會靈山上欲向龍宫訪大家西臺都事劉文美東平人來遊江南訪舊今回淮西西臺辭案牘南國泛舟航淮海壯遊夢關山古戰場秋風秦樹老春雨楚萍香此際多佳句驚人奪夜光入蜀題行紀遊吳憶講幃一亷伸正氣羣杜畏公非讀律師黃卷論文友白衣明時休老去臺閣想風威山居有懷窗前草帶不須刪車馬來稀夢亦間夜雨欲添漁浦浪夕陽偏照富春山豈無髙士藏玄豹會有幽人寄白鷴見説城南春正好相期杖履過桃關春日寄平常居士硯落燕泥書滿樓看山卧到越中遊一池春水養科斗半樹夕陽揩牸牛野􅉡療飢多筍蕨隴雲呈瑞盡來牟北窗人在羲皇上應掃蒼苔枕石頭寄題野航亭為洛水陳景文作靜觀塵水日茫茫大地誰能一葦航祖笏不妨傳相業漁蓑正好藉禪床晚潮欲上橫春雨秋水才深載夕陽萬里卧遊唯一息白鷗入夢是滄浪筆床茶具了生涯倣佛當時畫舫齋雲卧東山思入剡雨吟西澗記遊淮百年泛宅同漂梗萬事虛舟等夢槐自是人間間宰相不愁炎瘴過瓊崖江月松風集卷二
