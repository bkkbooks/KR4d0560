body:
  text: 江月松風集卷三元錢惟善撰洛陽陌驅車洛陽陌周道何逶遲玉帛走侯甸金湯固城池潘令好桃李阮生多路岐銅駝卧荆棘索靖獨先知隴頭水嗚咽隴頭水東西流至今胡馬不敢飲野狐時見侵月明古磧在氷合交河隂隴底有白骨啣寃啼夜深闗山月落落漢時月蕭蕭古戰場揚輝子卿節逐影細君裝髙卧玉闗外低沉青海旁不似閨中夜秪照繡鴛鴦長安道車馬如流水樓臺結彩虹王孫來戚里豪士遇扶風不睹衣冠盛空聞意氣雄鳶肩亦何事日暮醉新豐折楊栁何處好楊柳攀條贈逺行花飛度江水客醉蹋歌聲秋色彫榆塞春隂接鳯城一枝不敢折為近亞夫營梅花落笛裏梅花落何處最多愁紛飛江月夕吹破隴雲秋腸斷白榆塞夢回黄鶴樓行人不堪聼雙泪滴孤舟湘淚竹筦黃陵廟前捐佩玦龍影摇文織湘血翠幃塵滴不乾雲湘水無聲楚鬼咽蠻娘㺯作呉娥吟五音嘹喨生枯節一聲直向天上聞手挾飛仙挽秋月嗚嗚似向烟中語十二螺鬟排律吕黄鶴樓空人不還斷腸聲裏招神女金銅雙騕􅒁歌闔閭城外吳王陵金精化虎曾上騰漢侯珠襦爛玉柙秦皇銀海燒魚燈佳城鬰鬰三千載摩挲長狄今何在石田耕破雙􅒁蹄泉下房星黯無彩雲霧晦㝠辭夜臺朱斑繡澁筆生苔闕哀我弔古伊孰儔好事稱是神明噐我疑出自祁連冡百戰功殉龍種闕峴山分題送錢德謙之湖州學録山在州南五里唐李適之為别駕嘗登此有酒樽在焉東坡守吳興日嘗登之有詩云吳興勝襄陽以吳興襄陽同有峴山故也我昔遊吳興㝠搜峴山首前瞻李别駕後仰蘇太守文章世爭傳風雨樽不朽登臨豈無人二子名獨乆因之憶襄陽形勝開闢有羊杜嘗愛之聞望掲星斗致令墮淚碑感慨千載後虎據彼則然漁釣此為右兩地雖為殊能事果同否煩君吊陳迹長歌傳巵酒蚤起披衣起危坐心清聞曉鐘流光入窗白月淡西南峰游魚躍風藻幽禽翻水松青山如膏沐逺樹烟為容舟人與漁子蒲深處逢保叔墖金刹天開畵鐵簷風語鈴野雲秋共白江樹曉逾青鑿屋岩藏雨黏崖石墜星下看湖上客歌吹正沈冥酸齋學士輓詩身騎赤虬攬江海手擕錦囊入蘭蓀月明采石懷李白日落長沙吊屈原萬里壯遊遺劔履十年髙卧老乾坤萋萋芳草漢陽路王孫不歸遥斷魂南谷平章夀福樓落成壯觀湖山開甲第黑頭宰相考中書氣占牛斗窺南極手摘星辰切太虛賔客風流常座滿神仙縹緲好樓居飛闌十二標霞外注目吳山千里餘江心寺分韻得風字送陳輔賢之温州教授永嘉美山水物色分禪宫斷流涌金碧倒景驚魚龍兩峰横翠黛雙㙮卧彩虹齋鼓得寒汐漁歌生晚風蕭然地形勝逈覺塵囂空維昔有帝子駐蹕鯨濤中至今小金焦突兀摩蒼穹陳君富春彦五嵗稱神童三年為博士豈徒事雕蟲江心隔千里客星渺孤篷題華山圖西嶽秋髙翠揷天紫霞堆裏卧神仙長生漫憶金莖露消渇惟思玉井蓮石室有圖空想像洞房無鎻絶攀縁逺遊約我乗風氣白谷青崖思渺然送著作兼善赴奎章典籖龍飛天子中興年使者弓旌集後賢閶闔早朝班玉筍瀛州夜直賜金蓮五經同異須劉向三絶才名數鄭䖍黼黻當時遺老在長歌黄鵠送樓船題夷齊採薇圖海濱二老共歸周扣馬鷹揚似不侔寂寞西山採薇後清風未許屬巢由謝公墩分題送蔡恒之赴建康江寧鍾陵何鬰蒼中有半山寺緬懐謝公游盤桓此擕妓當時縱清談于今見髙致舒王起千載休官老其地蕭然愛兹墩胡為較名字嗟公雅好事閑處亦留意是墩在穹壤正與秋毫似那知人去來豈識姓同異嘗觀逹人心於物了無繫道不似町畦情偶似形器君行吊古餘一笑遣塵累送魏好義尹分水東來衆水發新安厯厯桐川第二灘萬叠冷雲藏亂石一江春水落驚湍青山隔樹連漁浦白鳥迎潮入釣壇地占客星髙隠處時飛鳬鴈上雲端題金明寺圖金明池涌槖駞虹駕幸瓊林歳歳同貔虎羽儀陳鹵簿魚龍角觝戲珠宫樂游臺殿今成沼習戰旌旗昔蔽空寂寞畵圖傳後鑑六飛回首塞池紅懐泳南江并簡黄晉卿州判憶宿南山小蘭若蒲床莞席岸烏紗埽雲曉辨諸峰樹聼雨夜煎雙徑茶白傅中原繙貝葉逺公何日刻蓮花逃空欲辟人間世江海蒼茫可泛槎長洲苑分韻題送于夢臣赴平江經厯長洲陳迹帶姑蘇倒影層臺枕太湖緑草一州春走犬青楓兩岸夜啼烏絶江旌葢誇吳使佩苑文章勝蜀都登覽無煩重感慨芰荷香裏想乗鳬題吳和之所藏五麒麟石名靈壁幻成麟一角鳴球尚想獸蹌蹌泗濵無復供王貢木潤𤣥雲寳繪堂題柏仲節所藏錢舜舉金碧山水浩蕩鷗波萬里春回頭車馬九衢塵往來共載乗魚客揖讓相逢化鶴人苕霅溪山浮紫翠蓬萊宫殿涌金銀桃花流水知何處猶有征夫逺問津懐大滌山李坦之徴君古律二首岩岩石室山髙臥如太白餐霞誦黄庭嘯月呼木客軌途脫軒冕武庫森羽㦸翠瓢酌丹泉清風振重席雖談老氏𤣥猶抱左傳癖曠尋方外遊杳若人間隔飛仙渺蓬瀛弱水浮碣石吾將泛星槎子亦躡鳬舄鹿門走冠葢韋布慕岩澤歸去採山中巢雲在蒼壁嘗思脫屣出塵寰何羡封侯過玉闗夷甫不平牛背上石生無事馬蹄間家懷萬里藂藂菊樓對西湖面面山何日擕書游大滌翠蛟亭下聼潺湲訪一溪長老宿桂子亭杖藜清逺溪幽事獨神領澗碧繞嵐霏林緑散風影坐忘人間世臥遊塵外境何年猨鳥羣歸來錬丹井宰淵徵昇仙詞武夷九曲水縈廻棹轉歌聲夜壑哀鍊藥偶擕丹鼎去乗雲豈待玉棺來夢歸淮海身為鶴夀及喬松背有鮐見説仙書遺肘後六丁下取叱風雷題王氏夀慶堂先世居蜀江左衣冠蜀又吳蓬萊清淺見麻姑碧桃洞府非塵世玉樹階庭即畵圖采藥他年入龍虎捫參何日返魚鳬九霞觴進長生酒五色雲中舞鳯雛題畵扇六言銀氣蒸成雲白嵐霏散作空青中有幽人小隠松風澗水泠泠秋熱融風未肯西秋陽逾六月夢登天姥雲坐想蓬婆雪列仙好乗空王者扇暍若人不復見滄浪一晞髪送極元講師主四明杯渡蒼茫不泛槎蓬萊雲氣赤城霞蜃樓上繞靈仙宅貝闕潜通海若家晝講風生鐵如意夜禪月照白蓮華知師訪舊山隂道細數千峰過若耶過吳淞江柔櫓江聲急垂虹曙色分天風摇素浪海日破𤣥雲肅肅夜來雁營營秋後蚊詩成渾不覺漁唱隔烟聞雲濤軒為吳孟師作剛仙消摇壒埃外乗飈穏坐金蟇背笑彼壺中縮坤軸廣庭何處聆天籟蒼茫豈但豪嵩衡浩蕩直欲杯蓬瀛蜃氣樓臺倐變幻鶴形車葢相逢迎須㬰回驂向天目把帝青珠捫斗縮冷浸瓊田漲氷谷倒射龍宫摇貝闕前道山靈後河伯笑琢石華拏海月歸來齋居浙江滸嶧山之碑爛秦雨四壁蕭蕭懸石鼓鍾鼎旂常輕一羽日與天香游時歌大人賦夢想澄澄秋萬頃目數英英春五素東海揚塵走蒼狗勸君且酌杯中酒一息萬里且搔首更招子虛問烏有輓傅景文卧病西湖曲招魂富渚陽賦髙唐八韻律熟漢三章丹旐風為馬青山石化羊應從赤松子不見少微光悼西山猨老衲敲松喚不還黑衣何處落潺湲似曾索果西湖上無復號弓楚峽間挂月影沈千尺樹嘯雲聲斷萬重山覊雌寂寞成孤怨更約他山獻玉環喜白髪為陳師復賦勲業無成散似樗青銅欣見二毛初中郎興動秋風起太傅詩成壯嵗餘皎皎易汙時一沐星星難染漫千梳等閒得此無情物自有忘憂滿架書華顛何必嘆浮生正數朝梳雪數莖黔首難愚秦子弟馬肝空賜漢公卿不愁春去成雲往唯愛秋來對月明老去故人容易别登山臨水更多情題廣微天師昇龍圖噓氣成雲薄太清墨卿靈怪研池腥波濤光彩失雙劔風雨晦㝠驅六丁朱火騰空超碧落翠鱗垂水捲滄溟真人上挾飛仙去安得攀髯過紫庭題節婦吕氏傳後有序節婦婺州永康何季長妻季長得北山何公魯齋王公學父子舉其學出西山真公鶴山魏公學者稱寛居先生節婦年二十九季長卒有一子名述生甫三月時南江冦盗充斥人死兵戈者十八九吕氏能披荆棘犯霜露保育其子若女且全其家至治二年春二月郡邑長吏文學博士奉承詔㫖備醪餼具禮幣旌表其門世變嫠居日氷清斷織時始知家學舊不與國風衰旌表神明裔流傳絶妙詞柏舟懷往古鳥繞越南枝江月松風集卷三
