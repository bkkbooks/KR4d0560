body:
  text: 江月松風集卷四元錢惟善撰杭學初正講座憲使吳公命也詩以美之使君天下士草木知名姓威風凛直指恩露承寵命柏府往簽司薇垣前秉政繡衣重監臨驄馬相照映齋沐謁黌宫釋菜見先聖拜跪瞻衮冕戞擊備鐘磬衿佩歌鹿鳴牙纛肅魚媵升堂成揖讓振席竦觀聽教由師匠尊禮始皋比正巍坐煥且嚴髙談響斯應道統續泗沂造詣希顔孟經籍光日星訓詁過王鄭皇家羅俊英鄉賔推孝行六舘四方萃五老萬乗敬被漸王化逺絃誦士風盛微公孰舉揚有識咸賛詠儀榘一旦新黼黻千載慶公賢如昌黎公學似安定辭闢異端熾業肄諸生泳不棄小有才所貴焉用佞去邪直踰繩燭幽明比鏡客憐敝貂蘓衆援飯牛寗輿歸月旦評事待秋風請鳳池山公啓冠豸湯子諍何時居中書蒼生慰懸磬贈真風道人平生逺慕列禦㓂御風泠然九州九西行入秦北走燕東浮並海南窺斗漆園傲吏八極游崆峒真人千歳夀消摇更上歌風臺弔古戰場一杯酒題龍虎孫希文尊師為蕭泰定所作丹房寓隠圖結茅雲裏萬塵空辟榖相期伴赤松晝夜常明羽人國春秋不老蕋仙宫飛騰䑛藥容鷄犬蟠伏成形看虎龍縮地壺天今有術願辭覊絆問叅同春遊曲和傅子通韻蛾眉曉壓黛雲冷蟻波緑泛秋蛇影千金難買能賦人轆轤升沉舊宫井青絲不梳慵早起十二螺鬟翠相倚鸚鵡解言天上愁紅雨香漂御溝水曦車急急催飛光杯中淺深愁短長東隣誰唱斷腸曲游絲落絮春茫茫金蓮凌波仙子出塵姿飛燕身輕太液池翠葢紅裳空裊娜錦心黄槖自清竒美人襯歩行春處學士承恩照夜時五老峰髙誰攬秀卧游閒對碧漣漪定山十詠風水二洞洞在定山南稚川嘗鍊丹于此東坡與李節推同遊唱和見集中方𤣥英許郢州林和靖皆有詩空穴来風自吸噓垂岩出水水渠渠天門此際通閶闔海眼何年泄尾閭隠者難招應化鶴飛仙可挾更乗魚留題太守懐蘇白好事今無五馬車鳳凰雙髻鳳凰山名在定山西其頂有兩峰儼然如髻形鳯來天目憩東南瓊樹巢空百鳥慚千仭翺翔秋綰髻兩髦髧鬌暮棲嵐誰嘲風落烏紗㡌自借山為碧玉篸仙女洗頭休望岳相期岸幘對虛談朱梁夜泊在定山北江船抵暮或避風俱泊橋下長虹下飲逆流渾雪色沙寒石闘喧晚飯鐘催隣驛寺寄漁燈映並山村月明欲解江靈語風横難招海賈魂省得楓橋曾繫纜一篷烟雨夢吳門定山早行謝靈運富春渚詩有曰定山面雪霧即此也前峰月吐四更初空翠沾衣積雨餘溪火夜明經略彴澗雲秋重負籧篨篠林虎與人爭畔茅屋雞催客趂虛不似闗山行役者勞勞服賈逺牽車六和觀月在定山北山名月輪寺臨大江遇月尤竒古錢唐令張君房曾宿此寺月中桂子下塔如牽牛子咀之無味招提髙轉月輪峰樓閣清虚十二重秋憶天香飄古桂冷凝岩雪落長空池光照夜明金鯽塔影横江卧玉龍聞道廣寒從此往竹房開處約飛笻五雲賞雪在定山北梁普覺禪師道場宋故事每嵗臘前主僧奉表以雪進黎明城中霰猶未集葢其地特髙故寒云獻瑞名山自昔聞化人臺殿雜金闕樹靈尚吐三花秀雲凍全消五色文鳥絶空江知棹泊鹿迷深徑待樵分興來更上髙寒處此境應無蕭使君龍門曉雨在定山西兩峰壁立如門上有龍潭能興雲雨歳旱禱之輙應神劖峭壁竦雙扉雨挾腥風下翠微黑入太隂迷爽氣白翻藂薄散朝霏螺横襍樹應藏景蛟吐癡雲未霽威回首他山新似沐登樓時攬女蘿衣漁浦春潮與定山相對謝靈運富春渚詩有曰宵濟漁浦潭者是也邱希範亦有旦發漁浦潭作江漲夜來髙㡬尋輕濤拍岸失蹄涔遲明帆發星灘逺盡日舟横雨渡深杜若風回赬鯉上桃花浪起白鷗沉越人艇子來何處欸乃若聞空外音浮嶼藏魚在定山側浮江如盤石下有潭聚魚玲瓏可觀潮出海門中分為兩派東派沿越岸向富春西派則直抵兹山而廻諺謂之回頭浪潭色空澄島影孤潜鱗時出迓天吳浪吞泗磬秋浮玉月照驪龍夜吐珠萬騎西來疑灔澦扁舟東去想陶朱投淵每笑窮漁者何處烟波覔釣徒浙江耀武將壇在定山北每嵗春秋萬夫長分翼江上帥士卒習水戰于此年年江上習舟師故事相傳刼火池春日樓船觀晉相秋風弓弩學吳兒素車白馬迎旟隼紫鳯𤣥夷畏虎貔日暮元戎歸細栁散花洲畔凱歌時觀廢宫城吾聞女媧氏立極斬鰲足又聞帝軒轅疆理定坤軸外以禦裔夷上以應列宿犬牙各有分雉堞遥相屬後世慎屏翰磐石固宗族召伯力營謝齊侯重城濮下逮虎視秦壯勞萬里築漢興閭左戍子嬰天下戮在徳不在險此理甚昭燭商辛尚雕峻劉徹務窮黷季氏憂顓㬰公孫恃巴蜀胡云厯代亡不鑒前車覆惟昔宋南渡錢唐稱輦轂衣冠晉王謝鼎社周郟鄏地氣有回旋天道好反覆長江既失守炎祚乃訖録江山仍畵圖廟闕盡回禄載瞻金瞿曇頋號缺毒恢基钁女墻分甎甃僧屋壞灰餘雪彩朽壁爛椒馥色侵禁籞莎根蟠故宫木内湖亂蒲荷人家種萄苜懷古感耆父攀危讓童牧哀哀雁孤鳴啾啾鬼隂哭歌殊彼黍離傷深茂草鞠千年城復隍萬變岸為谷撫膺慨金湯臨風送鴻鶩秋風逺埽睂夕陽聊送目平生渺堪輿藏可一粒粟盛衰傳自然不竇戒吾辱過環山求虞卿家訪申屠光逺千峰繚繞似環滁中有幽人此著書三徑曾陪羊仲入一亭還擬醉翁居晚風馬上花難折春日窻前草不除可喜異鄉同是客它年絶跡樹為廬久旱酷熱以杜詩林熱鳥張口為韻分得口字朱鳥居炎荒蒼龍集癸酉陽烏爥雲漢山蜩脫塵垢天瓢韜玉符風鐸緘金口洞庭收雨工常山潜電母魚跳渾渾波龜拆每毎畝渇想秦陵𤓰虛懐華峰藕懽應遲御史寃豈在孝婦載瞻天咫尺願賜水升斗劉時守待制見和定山十咏作詩以謝玉缺士來湘中笑攬衡嶽呑雲夢西瞻蛾睂呼太白南望蒼梧登祝融射魚昔號𤣥真子樵青隨處携詩筒扁舟匹馬萬里外曾渡瀛海過崆峒識荆載拜二十載棄襦誰復憐終童辭官錢唐聽江雨願言擊壤歌元豐定山品題缺自靈屹然當道江爭雄雲泉靈洞自竒絶燒丹嘗聞留葛洪浮山下鏁蛟龍窟百川砥石為之東五雲髙標太古雪日輪日上清虚宫招提翬飛翥龍鳯漁子暝宿蘆花風是間勝槩難指數作者往往皆名公山靈昨夜見我夢喜得珠玉傳無窮杖屨何時此幽討潤色舊觀重發蒙問公前身竟是誰香山居士東坡翁分題賦三髙亭送王彦昭之平江長往非求身後名此亭髙占五湖情歸吳豈為蓴鱸計去越終偕粉黛行漁子一時隨獺祭詩人千載預鷗盟筆牀茶具扁舟興還約烟波老此生近竹軒參差翠繞屋西偏手種琅玕已十年座有清風多簡册門無俗客勝林泉北窗夢到羲皇上東里家居剡水前投老此君同寂寞横經才罷又鳴絃題江行圖七澤秋連楚雨昏布㠶千里向荆門舟行莫近清湘泊楓樹青青亦有猨故廸功郎項君挽辭君諱缺字用文台州寧海人也國朝取宋之師在江上時宰拜表請出督戰風所私具疏留已鄉校試諸生以裴度征淮西事為問君設對極論時事斥其情狀讀史漢忠義節槩之事必感慨或至垂涕以廸功郎浙東提刑司凖遣而國亡矣大德中嘗具便宜二十事為書萬言將上之既而自名退翁以終其身至大三年夏五月壬辰卒年五十七後十六年當泰定三年冬十一月壬子塟江海之官後乾坤革命初醉醒千日酒出處萬言書泪落忠臣傳名全義士廬使公躋上夀應可致安車望雨落月相隨曉挈瓶井眢何處汲清泠雲霓失望憂千里河漢成章耿七星驅厲文能誦風伯禱龍官屢謁山靈孰知太守勤民念歌市重看喜雨亭送張仲舉赴昇庠訓導巷居身已困流傳江海聲名四十年鸚鵡賦成因鶚表斗牛光輙見龍泉史雲豈肯留賓閣傒載終期缺帝前若到秣陵應攷古未容秋興理漁船次陳君瑞遊鳯皇山光明寺左瞻劔㦸龍門並上脫冠巾鳯髻雙齋近木魚鳴晝廡行遲松䑕落晴窻雲深不覺山藏寺溪漲應隨雨到江未識此中真樂地三生先喜俗縁降芙蓉次斯道韻池上殷紅一萬枝紛披應不為秋衰錦城主者愁風雨玉案仙人涴粉脂蘭棹渉江辭越女雲裳擁水却馮夷月明四十餘里路夜宴何須歩障施江聲得五字小海歌闌渺平楚中流日暮猶鳴櫓怪疑鐵笛和龍吟清應氷絃出魚舞響入蘆花暗長潮寒吞樹影晴飛雨溯源欲聼巫峽秋夢繞峨眉月三五竹軒為吳江朱君賦若人嵇阮流髙標疇敢伍家居近吳松種玉繞環堵寒碧千畆雲秋聲四簷雨開徑友元卿瞻淇師衛武怡情即邱壑忘形孰賔主徑造謝輪蹄眩摇雙碧吐缺題缺火心靈養寸丹寂寞剡中餘野興裵回歳杪接農懽山川何處真竒絶晴泛扁舟十八灘苦熱夜坐樓居小溪上凉生二更後流螢入深竹鳴蜩息髙柳浩歌欲凌歊新浴聊去垢靜引白團扇沉思碧筒酒散髮濯風露開窻納星斗明河與海通皓月隨行走賞幽勿造𤣥佳句難成偶所懐不可招南澗蒼髯叟江月松風集卷四
