body:
  text: 江月松風集卷五元錢惟善撰三月既望求虞卿申屠光逺葉子實諸友載酒過西山酹右丞公墓飲泉菊亭真人漢飛龍孺子嬴失鹿三輔歸版圖九月走臣僕豫章收楚材遺珠貢揚牧黃鵠下瑶池白駒出空谷緬惟右轄公戎裝映儒服堂堂貴黥相便便夢松腹騎箕感商宗烹雌遇秦繆英雄北海孔詞藻東吳陸一時彗星䟽萬里儋州秃名因直言奮恩被昭代録虎賁輿承明紫微端秉軸羊裘耕富春赤松期辟榖翩然五湖舟南歸得休沐首丘全要領不貽隴西辱我生後百年慕藺仰髙躅相逢盛徳後再行西山麓佳城何鬰鬰爽氣殊肅肅至今白雲裏猶藏君賜轂麗句吟月梅遺文記泉菊玉筯丞相篆寒芒射人目彼哉負國者地下有餘戮公乎不可作釃酒塜上木奉和太常博士柳公浦陽十咏詩仙華岩雲縣北有仙華岩翠掌浮空雪景尤竒仙華生白夜光澄五指分明最上層氷凍金莖承沆瀣月寒玉筍揷觚稜麻姑雨葢從空降少女雲軿自此升㡬欲凌空披鶴氅剛風浩渺興難乗白石湫雲白石龍湫在縣東南能出雲為雨雲雨深涵白石泓魚鱗屋冷氣輕清中藏異瑞成銀甕下隠神蛟見句嬰岩客裁詩春靄靄山靈澤物夜英英誰因肺渇嫌寒冽澗底歸來更拾荆龍峰孤塔在縣東龍峰古塔實為蒼龍左角巋然特立梵王宫梯級惟容鳥道通翠壁雲綃經刼火鐵簷鈴雨落秋風髙標揷漢蒼龍左倒影横江白鶴東何日捫蘿尋勝跡不愁千里目難窮寳掌冷泉寳掌山唐千歳和尚道場有㸔經行道洞巖竇出泉極甘寒清泠寒沁白芙蓉靈物蜿蜒古有龍山見曇華森寳掌洞藏貝葉和金鐘聽猿欲訪三生石見鶴還疑五老峰赤脚只從泉上去蕭然卧雪㸔雲松月泉春夜月泉書院祠朱吕二先生學者肄業其中泉在空山月在天東萊夫子武夷仙擔簦有客來長白載酒何人學太𤣥心印寒潭同皎潔書聲春雨襍潺湲一燈肯借棲松桂飽聽南薰鼓舜絃南江夕照南江橋西望原麓返照如畵圖中目盡江南送夕陽空明直下接漁梁千重雲岫連平逺五色霜林映渺茫孤鶩倒飛天上下長虹髙卧水中央白雲紅稻多秋思付與詩翁了醉鄉潮溪夜漁去縣五十里溪流始大有魚蝦之産魚蝦溪産正鮮肥水沒蘆花舊釣磯笭箵候潮秋得計參差吹月暮忘歸九淵貝闕疑龍國一道鷗波似鮚埼黃帽櫂歌回夜半船頭髙卧緑蓑衣東嶺秋隂縣東東山嶺平林廣野秋常多隂青山失色暗丹楓廣埜平林杳靄中半嶺無雲時慘澹尺天不雨亦空濛㝠㝠南向藏𤣥豹漠漠東開見白鴻髙處夕陽難攬結埽除隂翳待雄風深褭江源浦陽江源出深褭山在縣西十里深褭淵源萬古流溯洄誰解泛扁舟險疑灔澦來巴蜀髙訝崑崙近斗牛混混直從開闢有洋洋未許網羅求東行須過浦陽汭清咏難追謝守逰昭靈仙蹟昔黃帝少女于仙華巖上昇下有昭靈廟水旱禱之輙應肌膚氷雪藐姑人此地昭靈迹未陳華表鶴歸終解語鼎湖龍起後攀鱗雨香寳穡瓊田晚露冷琪花碧澗春仙馭時隨青鳥去定陪崑圃宴羣真半閒雲白衣蒼狗自悠悠川上山中任去留賔主已忘同舍宿神仙何事帝鄉遊無心更出千峰雨有約平分一榻秋寄與聽松閒宰相好來怡悦伴湯休瓊花賦管侯家所植者廣陵移種謝家池折却東風第一枝承露掌寒生玉粟欝金香重綴氷蕤女車曾過唐昌觀煬帝空游后土祠十二䦨干天上夢㸔花應不似當時故翰林待制劉公時中挽詞平生寳繪燎秦灰有酒長教笑口開中夜聞鷄曾起舞晚年愛菊竟歸來聖賢欲獻王褒頌綘灌那知賈誼才悵望龜溪埋玉後湘江雨濕釣磯苔奉送前御史監察河南僉事逹兼善移官淮西三十韻弱冠魁髙第臚傳孰雁行臨軒知主聖獻頌屬臣良御酒頒光禄恩袍出尚方聲華初赫奕眉宇最清揚秉筆居青𤨏登瀛歩玉堂窮經聞道統瑞世應文昌慣立螭頭陛曾含雞舌香蓂階瞻日表芸閣侍奎章才可讎東觀勲宜紀太常玉書探禹穴石鼓識陳倉學士陪天上詞官近帝旁規忠進洪範斬佞請干將烏府風雲㑹金陵壁壘彊法嚴秦御史篆逼漢中郎薦剡符輿論褰帷肅憲綱在庭峩獬豸當道去豺狼拜命辭中禁分司震大梁舉賢持藻鑑務本篤耕桑往事摩銅狄終身感素王金鰲憑要眇鯨海入蒼茫舊約桃花縣新除枳子鄉携家來帢幘乗驛度艅艎講易懷龍井論詩擊燕缺同心如律吕分手未參商楚望陵藩屏徐方接要荒石牛仍角觝金斗直光芒山憶浮槎至州傳戰艦藏絶江應泛月入境定飛霜人物周公瑾神仙魏伯陽長淮萬里外鵰鶚正翺翔曉入白岩山榽橋低小路縈廻樹裏人家門未開馬上西風凉似雨濕雲吹下白岩來又騎馬入亂峰乗流絶溪渡曉來岩上風吹落樹頭露故婺録事文林周公挽詞東南耆舊半彫零士類於公見典型秋色愁予兩淚雨夜光墜地一文星扶摇嘗擊三千水富貴將登五十齡為縣有能公論在傳家清白遺麟經凝塵冉冉繐帷寒痛絶郎君問曉寒進士杏園三月宴勞人花縣十年官山中圖史遺雙硯海内才名惜二難此别豈知成隔世西風吹淚洒秋蘭却埽城南水竹居病多時讀養生書四知清節辭金際五字新詩夢草餘聽雨毎留聨臥榻㸔山空約借肩輿天台髙逺濤江濶丹旐翩翩祖奠初滿城縣學瑞芝并序浙西憲府經厯汲郡劉君瑞卿前為滿城縣宰新修孔子廟時天厯元年冬也越明年有芝草七華一莖生大成殿中右楹礎石上監察御史南鄭王君伯成序其事于是諸公作詩以美之有美滿城宰芝生孔子堂文明來瑞異徳化見慈祥頖水魯歌頌齋房漢樂章因之挹眉宇髯㦸冷秋霜題郭天錫山水擁腫無根山癩頭銀雲截翠半空㳺酒醒拭目知何處華嶽飛來一片秋秋熱得雨有懷今夏五月凉殘暑不易過楚氣蒸火雲商飈動塵堁涸澤鱣魚虞大夏燕雀賀寒泉當晝濯茂樹終日坐𤣥白逃士嘲丹鉛督兒課蛟龍候帝符霖雨須王佐力田歳乃旱良農心亦堕忽爾天瓢傾令我客愁破萬事付鷗波百年同蟻磨秋髙海濤北夜朗江月大天香桂一枝地籟竹千箇懐人當此時狂歌誰敢和柬叔仁并寄子平徴君天際長風送曉㠶林深空翠裛春衫新知傾葢渾如舊多病論詩迥不凡紅雨入窻花􅉡􅉡蒼雲穿壁笋纎纎子陵臺畔能同隠何必商山與傳巖述懷寄光逺并柬城南諸友野人無事久忘機肯信紛華有是非花信欲闌鶯百囀麥芒初長雉雙飛書中歳月仍為客枕上江山屢夢歸時復思君倚深樹不知殘雨濕春衣青青草色接平蕪翠涌千峰入座隅戴勝晨呼采桑女於莵夜警牧豬奴羽觴洛水聞修禊單祫温泉想舞雩欲泛蘭舟過春渚一樓烟雨似西湖紅塵飛不到岩棲燕子人家樹木低兩岸春風吹杜若一株寒雨入棠梨指桐仙去山中邑訪戴人非雪後溪㡬夜思親唯有夢柳花路上蹋香泥書懷春夢渾難記年光不可留絮輕隨野馬椹熟醉林鳩緑樹深藏徑青山直上樓功名等閒事一笑拂吳鈎偶成苔花洗春雨藉此聼潺湲終日無客至滿樓都是山寄光逺沙淨花如雪江昏雨似絲山靈揚鬼火木客和人詩萬里丈夫志十年童子師此行深自愧未謁子陵祠上已懐古二首泛雪舟杭似剡中種𤓰丘壠想江東當年三鶴成陳迹只有青山尚姓桐不見風流葉右丞橫山陳迹復誰登老拳曾醒將軍醉當日蘭亭恐未能寄求唐卿求仲不來閒竹徑子陵難見隔雲山已拚斗酒留春住更約扁舟載月還富春附海舶還省侍望拜子陵祠堂祥飈來西南五兩候明發龍驤萬斛輕鼍鳴五音節烹羊祭波臣巨壑東連渤饋餉方走燕樓船不征越時余游富春附載㸔山笏望拜子陵祠客星炯林樾他年如陸行瓣香重上謁歸來見慈顔懽喜入心骨嗟爾畎畆民輕命鮫鯨窟啖利亦細微風濤乃倉卒渺渺三神山蒼蒼一毫髪鞭石笑秦皇欲令海濤竭至今采藥人島上成珠闕疇能往從之桃花千嵗月送李士㢘調浙東帥府史并柬石室禪師借問東遊何日還滿城栁色唱陽闗惜花心老笙詩裏夢草吟新案牘間兩地相思㡬風雨片雲只隔一江山老禪雪竇非塵世試聼𤣥談半日閒送姑孰陶性之學正赴京師求仕赤縣觀光日青雲發軔初長楊應獻賦行李只挑書五栁嘗歸去三茅非隠居聖明今在上未仕復何如賦酪櫻桃聞道醍醐稱䗶櫻熟紅仍帶露香傾氷漿出盎和崖蜜火齊堆盤化水精樊素口脂難並美烏孫肉食漫傷情尊前從此誇風味專與歌姬解宿酲送陳輔賢侍母之栁州興寧簿十年學就何蕃舍百里才淹楚子邦桂嶺風霜連橘井洞庭烟浪接郴江維舟夜聽啼猿獨入饌朝供躍鯉雙别後夢魂思舊業富春山遶白雲窗送王景賢侍母之閩省父雲海移親舍天風送客桅求書吳子國訪古粤王臺嵐氣千峰雨灘聲半夜雷燕山翻入夢一路桂花開送桂希賢還四明爾家住近慈溪曲陟岵觀雲客身獨一行作吏走官府十載明經笑塲屋丈夫落落志四方讀律師古卑申商養親寧免干升斗取士未可拘尋常江山清竒數明越千里東歸正炎熱禱雲處處望霖雨息䕃時時防道暍扁舟早發江之臯别酒滿酌新蒲萄亟趨庭闈侍扇枕重來應及秋風髙江月松風集卷五
