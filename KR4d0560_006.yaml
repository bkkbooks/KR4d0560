body:
  text: 江月松風集卷六元錢惟善撰題濮陽老人手卷濮陽老人年七十一身白屋勝朱扉往來岐路風波險搖落江潭樹木稀坐上歌聲彈劍鐵壁間燈影挂弓衣故山何處交遊盡嵗歲春來送雁歸送魏好義宰樂清樂清茂宰之官去山瘦溪寒一路秋月下鮫人來象浦雲間禪衲遍龍湫絃歌百里兼農事翰墨三年了宦遊王謝登臨舊岩壑不妨退食繼風流送李德夫福建運司書吏吳栁初黃越樹丹照人秋色送征鞍雲隨親舍回揚子山引郵城入候官萬古鹽饒輸海賦兩潮漁上助盤餐武夷我有南遊約欲借扶搖駕羽翰十六夜登拱北樓看月蝕龍宫涌出白蓮花拱北樓髙叠鼓撾萬里光輝瞻玉兔三分破缺食金蟇長歌野老頭垂白再拜微臣額踏沙夜半氷輪復端正誰從海上泛靈槎寄中竺長老竹泉禪師嘗過石橋尋逺公塵緣未得一相逢澗聲如雨月明夜兩箇猿啼千丈松送馬士瞻北上十五年前烏府掾說書幕下最風流陳情似聞李令伯好事復見韓荆州五弦手彈海月曉一櫂夢到江雲秋此去定除山水郡依紅泛緑肯同遊柬柯博士藝香閣下丹邱生十年不見雙眼明圖書一代聚東壁風浪扁舟歸赤城落筆楚山春雨曉披襟海嶽秋天晴欲求樹石挂林屋夜半只愁神鬼驚賦歲晚江村何地謀生樂吾農卒歲晴不辭王賦重但願泰階平水縮江聲落風叨雪意成同雲如可解斜日尚能明送李時方回東平吳山青入縣門來一徑蕭蕭長緑苔南國棠隂遺老頌西河栁色故人杯九天應戴神羊立千里仍騎瘦馬回别後逋仙更相憶東風開遍手栽梅夀松老人汪拱宸八秩蒼髯緑髮古仙翁身住空同第幾峰欲采紫芝從綺皓却摩銅狄問喬松珠明秋水蚌胎老酒釀春花琥珀濃氷雪相看彌夀艾此生夢不到秦封賀假吉甫新任照磨江浙行省祥琴初撫拜新除喜劇彈冠欲廢書南省并從丞相幕西山相對騎曹居黃衫分宴參珠履華服承顔侍板輿聞道詞章多藻麗紫薇香露筆花舒王敏夫挽詞十歲能詩早絶倫前身應是玉樓人共稱王勃天才敏自顧虞翻骨相屯龍劔篋空啼鬼母象車賦好冠王賔西山何處埋瓊樹愁絶梅花野水濱元日紀事望闕衣冠拜紫宸九重鳴樂奏韶鈞上天膏澤何多雨下土萌芽自發春門外泥深騎馬滑橋邊水上倚樓頻餞寒最喜條風早歌罷青陽已得辛初春聽雨殘年立春十日雨客子聽雨萬端憂五更狼籍梅花雪一似蕭騷梧葉秋野岸宿雲穿樹出湖天新漲壓城流一晴鳴鳥在窗户拄杖相期載酒遊元日次韻朝廷有道荷天恩元日嘗隂置勿論春事憑梅問消息年華看竹長兒孫田翁火炬占風色海鬼桃枝蝕浪痕送故迎新無限意不妨醉倒罄壺尊次韻黃孟成貽墨齊先生翩翩佳公子吳娃相勸酒便娟杜曲花依約章臺柳寄書魚滿尺買笑珠論斗若非玉堂仙定是金谷友與默齊先生聨句成口號官柳新晴啼乳鴉外甥昨夜喜還家河魨江鱭都供酌獨奈春寒惱杏花春風吹開杜若花春日多病憶還家自是老懷容易惡錯怨鄰女弄琵琶菊隱為求唐卿賦聞說富陽求處士百年心事付黃花九英燦爛秋餐露六氣澄清旦食霞種竹門前同蔣徑見山籬下似陶家兒童報道松醪熟便漉烏巾不待賖運司經厯范明府致仕歸太原海玉篇章細討論白頭幕府最承恩吳鹽美利踰猗氏晉産竒材過大宛江上春潮桃葉滿道旁夜月李花繁島居民力罷煎竈扶䇿何時叩帝閽送梁叔逺久慕張翰入洛年束書未覓賀循船緑波草色江南岸綘闕虹光兾北天異路飛騰辭狗監故鄉拜掃識牛眠臨岐愧乏黃金贈爛醉桃花酒十千送王文正還魚臺春雨杏花落緇帷方讀書江河行泛鷁鄉邑夢觀魚作賦殊王粲明經埒魏舒慚無繞朝䇿握手更躊躇元宵月蝕不復燒燈似往年無風簾幕看嬋娟彈筝玉宇明千里伐鼓氷輪沒半邊不信中秋有妖孽可憐今夜最清圓五更光魄渾依舊怪語深慙盧玉川粉團花下夜飲萬花碎煎玉團團晴雪飛香夜不寒恰似玉人相對立酒尊移月近前看姑射仙人白羽麾夜深和月下瑶池落英散作白蝴蝶香滿東風金屈巵題錢選毛女槲葉紉衣紺髮青宫粧變盡尚娉婷君王若問長生樂只有胡麻與伏靈送滕義甫赴建康學訓導建業山川似伊洛故人文藻並應徐佩襟北面諸侯學幣帛東來御史書宫樹雲荒龍映虎岸花風細雀銜魚明年定有公車召却擬橫經論石渠次孟伯貞韻寄罕玉庭道人新刻蓮花漏不肯出城頭髮長一榻松風時入定半簾梅雨晝燒香溪聲衝激青林曉山氣侵陵白苧凉見說移居舊安養我來翻恐老僧忙端午日與劉環翁遊故內寺百尺青銅宫井西當時曾見鳯來栖轆轤響絶西風起從此月明烏夜啼題竹石怪石蹲虎爭欲射老竹化龍誰敢騎飛將不來仙客去向日海霧精靈悲次韻晨起二章用答吳寅夫見憶晨起悅新沐散髮風霧凉沉沉北窗雨素書閲岐黃燕坐萬念寂空林薝蔔香思君成夢寐春草滿池塘晨起坐髙閣焚香誦黃庭樹合野雲碧山浮江雨青神不在尊爼酒香肴亦馨扁舟望子久拏音未由聆建德山中洪水雨後作寄默齊從事鴻發瀟湘郡澒洞裂崖石蛟蜃夜移居雞犬朝失宅客子憂緒繁江山亂清碧杖藜不出門行潦髙數尺螢火息風條窗户雨氣積凉月蕩殘暉光照床頭白床上無所有藝香二三䇿懷人耿無寐披襟坐通昔送洪省吾歸淳安君家山水鄉耆舊半遺逸讀書錦溪上平生事著述識君因令弟晤言能幾日相見既遲暮賦歸復倉卒雨林碧冥冥雲嶺青嵂嵂岩石忽破裂江波尚奔溢扁舟從此逝六月海風栗余聞彼山中美木多椅漆山水有餘音為我斫琴瑟斫成倘相遺鼓以軒轅律豈無薰風來返我太古質君歸與世違幽栖保貞吉濯纓松下流長嘯時抱膝寄語山中人悠哉勿輕出送月明德從左丞相公入貢朝賀送客江河秋潦新凉風似水月如銀掄才南省儀曹掾進賀中宫贊相臣野濶斗牛連析木天髙𤣥武直鈎陳清尊九月都門道定對黃花憶故人八月二日夜與仲仁孟宣同坐聽雨寂寞陳蕃榻清秋坐鄉晨乾坤同是客風雨獨愁人巷閉休沽酒燈明更接茵詩成還寄逺欲采越江蘋再送梁叔原二月曾期上國游遲遲行李又經秋月明太液飛黃鵠塵滿長安躍紫騮兩榜名門見喬梓一尊故里酹松楸楚楓初赤吳雲白若過蕪城試倚樓題張仙人隱居圖百年曹氏宅萬古張仙山藏書白雲裏結屋青林間泉迸石虹裂樹深溪鳥閒我欲從子遁騎驢相往還洪安道挽詩自悲獻玉屢無功夜壑藏身萬事空家學一編耽傳癖客懷千首坐詩窮梅花有約閒湖上桂樹無香死月中見說錦溪墳墓好幾時絮酒酹西風江月松風集卷六
