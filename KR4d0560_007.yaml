body:
  text: 江月松風集卷七元錢惟善撰東湖老農為盛仲仁作老農生計在東湖二頃良田宅一區斗酒熟時多稻蠏扁舟到處有蓴鱸風霜兩鬢秦毛頴烟雨千頭楚木奴便欲相從買黄犢醉吹鐵笛和吳歈送鑑虚堂分題得多稼亭多稼亭前祝華封家家擊壤樂時雍雲連白水觀秋刈月滿青山聽夜舂毎喜豐年占二麥更㸔甘露䧏雙松帶經久欲追髙鳯早賦歸田去學農九月晦日張機仲同宿明慶亨㑹堂上人房是夜讀羅昭諫詩寳坊金碧近閭閻閣道沉沉警夜嚴萬石華䲔驚海獸四簷鐵鳯語飛亷傷時我豈同昭諫覔句師能及道潜一榻茶烟清夢熟因思松瀑洒氷簾十月望日雨後與湯鼎臣過包山福泉峰廻路轉絶人烟葉隕霜乾塞澗泉山勢斷時江自見石根踈處樹相連人生安得灰為念衲子從教雪滿顛忽有海鷗潮上起分明落照在漁船寄牛彦伊不見故人今㡬年移家江上㸔風烟銀絲鱸膾最鮮美石勢蝃蝀何連蜷詞藻故鄉追晉問聲華他日擅臚傳梅花遲子西湖酒乗興何須雪下船聞項可立先生訃文星此夜落丹丘知是仙人赴玉樓乆待明堂修禮樂豈期髙閣東春秋百年丘壑全歸璧萬里江湖不繫舟堂上慈親踰九十哭兒泪逐海波流大風雷雨雹是日漳州李智甫作耗江城奔雨撼風雷飛雹如驅萬馬來蜥蜴吐成嵩頂見蛟龍攝取凌人猜聲疑玉斗鴻門碎勢似氷山白日摧个个錢文如刻就未應傷稼必為灾送文煥回揚州洞簫吹徹玉人家騎鶴樓髙酒幔斜春滿揚州二三月明年我欲看瓊花送安慶董榮卿之徽州試吏聞昔安豐有董生昌黎為作董生行淮水湯湯出桐柏迄今千載揚嘉名爾家安慶隣安豐譜系葢與生同宗李掾相携過南省時復負笈來黌宫逺遊不負丈夫志捧檄初為郡曹吏新安髙髙江發源西風挂帆疾于騎無從簿書廢文學要識吾儒有真樂紫陽適傳今在誰為持瓣香訪林壑次韻錢良貴江行晚潮西下月東出欲吊鴟夷事渺茫鼓角髙樓森虎旅㠶檣逺島聚魚商秋聲衝激風濤㟁暝色接連烟水鄉無限客愁禁不得芙蓉城郭夜偏凉題方仙翁手卷仙翁即青溪道士先生聞是漢諸儒長往千秋不可呼偶向青天騎一鶴絶勝赤縣下雙鳬史官自昔遺名氏仙蹟從今入畫圖顧我平生躭讀易欲從鷄犬扣虚無送劉彦昇百夫長致仕歸毘陵盟府勲勞舊清時將校閒有官居澤國無夢到天山老識兵書變醉乗烟艇還秋風吹畫角興在五湖間送徐子羽回建昌省親且過金陵訪舊并柬笑隠長老楚材落落似君稀重過金陵逸興飛燕子巷深秋草合鳯皇臺舊晚山圍十年學古猶為客一日思親便賦歸暫向石頭城下泊好從丈室問禪機送李士元歸湖南養親談笑胸中有六經掾曹辭去鬂星星江心見月秋偏白淮口逢山晚更青捧檄誰知毛令喜濯纓共詫楚人醒綵衣正好尋幽討只恐徵車下驛亭讀錢伯仁墓誌錦樹彫零譜牒分先生髙臥富春雲水邊種竹聽秋雨石上㸔山對夕曛白璧沉埋甘隠遯黃金鋤去樂耕耘清風不與身同冺宰木成隂鶴守墳題風雨歸牧圖野隂雲氣合蒼茫壁立山精白石藏蓑笠歸來牛背穏不迷風雨似尋常不見人烟聞鬼車長林昏黑雨如麻晚晴却㸔前峰翠過得溪南即是家班姬題扇圖無復承恩柘館春偶題紈扇淚盈巾賦成不費黄金買羞比長門失寵人送張小山之桐廬典史君家樂府號吳鹽况是風姿美笑談公幹才名傾鄴下子山詞賦擅江南霜晴萬木丹青徧雨暝千峰紫翠含縣幕從容釣臺去臨流應自漱餘酣送陳敬復携妻子往沛中省覲逺訪庭闈挈細君寸心千里獨殷勤吳船晚入蕪城雨楚甸秋連沛國雲酒熟鄉隣多黍稷肉均里社美榆枌别懷總付南來雁竚立蒼茫對夕曛就柬敬復乃翁伯甹助教一代文章獨好竒十年契濶總成詩寄書親舊憑雙鯉作樂朝廷待一夔登嶽每懷天下士歌風猶想沛中兒故人感槩思鄉國落日荒城畫角吹九月旦日吕彦孚約泛湖預為登髙之會後二日見馬彦初云夢余得詩一句隔岸人家竹最多因足成之時坐客凡八人十五丫鬟歛翠蛾檻船穏泛白鷗波入橋是處花無數隔岸人家竹最多樂事預為重九飲醉鄉擬賦八仙歌菊花滿揷烏巾小少壯懽娱奈爾何送賈運使惟一郎官南省才華盛耆舊中朝徳望隆煮海豈無齊相筴居官猶有魯儒風北方人品甄陶異西子湖山興趣同若訪魚臺舊游釣瓣香先謁孔林中送李從道遷江東憲書吏氣味何曾識綺紈風神時復寫檀欒掾曹無事歸來早落筆晴窗翠雨寒九日與武仲仁登尊勝塔寺鹿苑蕭條景龍山慘淡隂百年多感慨九日此登臨宫葉詩誰寫籬花酒共斟不知城外雨逸思滿幽襟香火今朝寺雲山前代宫雕闌陳迹在白塔瞑烟籠雨注蛟龍柱風悲孤鳳桐惟應江上水千古酹英雄題山居圖婆娑夏木䕃清湍終日㸔山罷釣竿絶跡不交當世士野橋無路蘚花漫吕徳甫妻施氏挽詞窻户凄風慘碧紗别愁分倚入胡笳沉綿無益三年艾憔悴猶看十日華泪濕鮫綃如雨散塵昏鸞鏡似雲遮夫君何處魂能斷兒讀殘詩到月斜送石處道貢江西憲掾擾擾黄塵事馬蹄扁舟忽上大江西斗牛夜靜龍光見霞鶩秋髙鶚表齊清白聲名馳逺道平安消息到深閨滕王閣在今猶古何日臨風手共擕送吕彦孚游四明買山活計未能成炊黍浮名本自輕擕妓每為湖上醉辭親暫作甬東行三江九堰無多路雙屐孤舟已半生握手丁寧南至後探梅細説歳寒情吕彦孚留别錢良貴次韻以送束書忽問浙東船聚散闗情重惘然千里江山隨雁去四更風雨聽雞眠故人留别短長句逺客思家新舊年至日登臨天姥望應題節物五雲邊送方大道之安仁縣教諭仕途惟有此送爾欲彈冠百里安仁縣三千分教官日新桐子業春在杏花壇去去望彭蠡㝠鴻響夜闌寄吕彦孚心跡都無海島疑光隂翻欲隙駒馳兒童㡬見成斑髩昆季相知讓白眉流水桃花通剡縣逺江鴨緑帶髙麗四明勝處君游遍一一歸來為寫詩寄四明延慶講主我菴無公說法魚龍不敢騷四明城郭靜風濤别離但覺成斑髩瞻仰何由睹白毫百衲雲衣披紫鳯五更江月吼蒲牢平生興在湖山裏安得扁舟共手操題遂初園圖送劉士舉仁和縣尹滿歸萊州縣令歸來樂有餘若翁康健已懸車腰鎌穫稻新為酒手板㸔山暫罷書萬井風烟連海市四時花竹映鄰居故人為撰名園記却擬登堂賦遂初送錢良貴之蘭溪一年一度省親廻歸客程途節序催去國未慙羊子别卜鄰還挈孟光來山中訪友休題鳳海上懷人本姓回行李無人舟一葉袖香知有橘三枚十一月初三日與袁鵬舉錢良貴同登雷峰墖訪魯山文公講主袁浙西錢浙東錢塘門外黄妃墖猶有前朝進士題一字排空晴見雁千燈照水夜燃犀周遭地帶江湖勝孤絶山同樹木低二客共馳千里目故鄉各在浙東西楊志行挽詞謝政還鄉里誅姦補聖朝玉堂開制苑烏府重賔僚名與曹劉並魂如屈宋招空齋書萬卷霜月夜蕭蕭江月松風集卷七
