body:
  text: 江月松風集卷八元錢惟善撰送兼善郎中朝京師名重西臺為御史禮優南省冠賔僚周官故事行春見唐殿新詩和早朝夢筆生花修五鳳彎弧穿葉試雙雕孰知風月同髙潔肯向江湖慰寂寥寄光希照禪師三載音書杳諸方道價行舊遊湖上寺新離石頭城歲暮煨黃獨秋來采決明相思不可見江上共潮生程國珍雙親同慶八帙鶴髮升堂綵服趨春風入席奏笙竽庭闈自結同年會鄉里爭傳拜慶圖鸞誥待封承寵渥燕毛成禮接歡娛從今八十躋髙夀更看曾孫戲掌珠袁德齋升仙詞小隱城南水竹村嵳峩樓閣耀朝暾山中弟子歌桑户海上仙人説羡門鵝換黃庭空有帖鶴歸華表定能言末由酹酒梅梁下萬壑千峰翠雨昏六月遊包山福泉平生鹿門趣有意此誅茅地控江分月山因人姓包海鷗飛落日野馬牧荒郊流水千花樹重期載酒肴送尹希善之宣城縣令謝守登臨處能官儘自佳戴星趨憲府喜雨問農家溪水偏宜酒山田盡種瓜敬亭須繫馬吟到日西斜元宵偶作彈壓城池夜屬櫜放燈那復事奢豪水晶宫裏香風細曾見神山駕六鰲寺前楊柳夜迢迢何處香風度玉簫天上舊時明月色鳳城曾照賞元宵送朱子招遊金陵自送越人遊兾北先從揚子過金陵雨中情緒難分手海內聲名已折肱歸雁去時開畫鷁流鶯啼處别青綾此遊不似幽居者頭白山林祗待徴正月十六日遊湖上東風杖屨偶相從試傍新堤覔舊蹤花竹園池通一徑金銀樓閣倚千峰林煙日午青先暝湖水天寒緑未濃賣酒壚頭人似玉抱琴時復醉臨卭送陳新甫太祝造祭器還京師先皇入廟從昭穆太祝還朝告鼎彛制作喜存三代意蒸嘗應永萬年思公庭作樂羣趨事宣室承恩尚問釐黼黻太平班馬在諸君擬賦漢歌辭送丘長卿之樂清尉大冠黃綬初為尉小學青襟盡送師莫倚弓刀能弭盜且從山水遍題詩夷猶吳榜乘風穩咿軋潘輿度嶺遲聞説上官當五月吹簫人唱海榴詞送王子仁之閩帥府三嵗抽毫直理官南遊且盡一尊歡白雲姥嶺慈親舍緑樹人家嚴子灘幕下文思方雜沓軍前烽火漸平安儒生無意封侯事老我江湖一釣竿張園雜賦清夜無眠疊鼓催竹梢垂露點蒼苔滿池月色如霜白一片蛙聲似雨來野鶴孤雲思不殊好風時至立須臾夜深庭户光凌亂月照青桐第幾株螢火隨風撩亂飛樹頭殘雨滴人衣無端疏竹偏宜月寒碧蕭蕭夜入扉二馬草間二馬脫羈絡毛鬛蕭蕭兩相嚙舉頭忽向夕陽嘶臺上胡歌猶未歇寄金伯仁畫舫相逢對夕曛别來無日不思君水花晚淨湖中雨林木晴鋪澗底雲三徑主人真好客一家兄弟總能文重期酩酊南風裏盡把詩題舞女裙故陳母夫人張氏挽詞弔喪逺自四方至合葬初諧百歲期孝友哭家城破日尊榮見子宦成時盡稱剪髻隆賔禮獨後登堂拜母儀博士新銘埋玉地晉陵西望白雲馳送李可度暫駕仙舟絶海濤未應歸夢又金鰲漢家長者為廷尉江左參軍辟掾曹十月蛟鼉淮浪靜九天雁隼朔雲髙匡時有用須公等莫遣吳霜點鬢毛挽翟公忽報蒼桐旅襯回麥舟千載感陳雷病危瘴海鵬程短官近長沙鵩賦哀地下文章仍著作天涯魂魄定歸來鄉人漫號將軍墓樹影蕭蕭掩夜臺和錢良貴寄春山韻江寺當幽僻禪林絶垢氛人生真是夢世故不須聞靜見千波月間留半榻雲寶華飄滿座聽法有龍君寄趙初心風流文采舊王孫一代衣冠禮數存天上神仙居海島雪中賓客宴梁園金魚換酒尊常滿寶鴨焚香火自溫紅袖烏缺扶醉缺梅梢新月照黃昏送張石隱歸東陽餘不溪上張公子一日乘槎過婺州客遍江湖成落魄才兼書畫擅風流月明八詠樓中醉雪盡雙林寺裏遊覔取東陽髙價酒一尊為我載回舟十五日吕彥孚王槐卿方雲器馬彥初同過三茅觀山時雪晴雲散憑虛望逺不知身世之在城市也賦詩一首以記之三茅真觀聚羣仙閬苑蓬壺思渺然澗雪晴飄松上雨野雲冷護洞中天眼髙但覺江湖小心逺那知井邑連欲與梅花爭比夀抱琴擕酒酌年年賦夀梅問梅此地欲尋真不抵孤山野水濵却月觀深千嵗夀返魂香在半邊春苔皴朽幹元無恙花綴枯梢似有神雪壓畫闌開較晚不隨點額化芳塵送陳衆仲之官翰林應奉畫鷁齊飛發棹謳泛江幾日過揚州曉雲最白梅花驛春雨初香杜若州一代文章關氣運十年館閣擅風流緑波草色連天逺不是尋常送别愁寂寞江南鄭廣文青藜夜照校書勤懷人遙望燕臺月奉使還探禹穴雲春咏燭花深夜剪早朝諫草鎖窗聞相知愧乏青瓊報目送風帆日易曛兼柬張仲舉徵君鼓枻坐春水快意如登瀛燒香把銅爵眠月舒錦鯨公才不世出豈特千人英國史馬遷贊月旦許劭評東觀徵博士南郡别諸生愧無雙南金贈此千里行萍香大江滿草緑長淮平紅藥有花譜金盤遺酒名若逢杜書記暫息廣陵城送顧君澤遷平江舊識黃堂掾風流見逸才秋蓴魚蟹郡春樹鹿麋臺遷檄郵亭送離尊客棹催有詩須寄我握手更徘徊君家九峰下作吏擅時名隱語中郎學歌章大雅聲江雲龍廟濕山雪虎邱明回首片帆逺桃花春水生江月松風集卷八
