body:
  text: 江月松風集卷十元錢惟善撰送楊仲賢之金華縣典史分題得金華洞吳興郡曹掾左幕向金華雲氣藏山寺溪光入縣衙仙人同採藥茂宰共栽花洞府予能到騎羊㺯碧霞寄髙平田長老餘不溪上楊家寺雲徑迢迢九里松旁舍泉香新釀酒前峰月出始聞鐘天龍未散靈山㑹石馬猶存夏屋封見説計籌真隠地他年卜築許相從送域無住律師住四明五臺大士無心過海行胡僧卓錫此經營龍能䕶法壇場㓗花不沾衣戒律精長夏雲中雪山冷髙秋河上月波清故人只在隣峰住何日為賔學許生新安徐氏號茂林亭曰深凈髙士卜居山水幽寄題珠玉盡名流清風不待開三徑落日還同泛八溝枕簟嫩凉宜醒酒琴書真味足消憂㡬時得過雲林下一潄潺湲卧石頭題柯敬仲博士明雪窗長老蘭竹石合景四幅各一首適從楚畹來邂逅此君子乃知岩壑姿風致頗相似光風泛崇蘭玉立共瀟洒襟抱有雙清嵗暮遺逺者又石逾玉潤不生苔鐵笛吹殘自裂開絶似雨晴炎海上一雙翡翠忽飛來九日與吕彦孚陸孔昭袁鵬舉乗風雨泛湖中有期而不至蔡東流上官東閣楊邊梅分韻得滿朱二字九日雨凄其西風吹不斷空懐戲馬臺無復啇飈舘湖濶浪花明林昏烟樹短紅船大于屋坐客不能滿時序多風雨雲林總畫圖翠屏低晚嶂黑米長秋菰未遂羣賢集那能四美俱扁舟載西子唯願學陶朱九月望日與楊亷夫司令袁鵬舉陸孔昭賔王泛湖過岳墳及林和靖墓分韻得横字梅花岡上酹先生詩句猶同水月清僧飯林鐘時復扣客來野鶴不能鳴百年榛莾餘瀛嶼九月芙蓉似錦城更約雪晴湖上宿洞簫留向夜深横送張定之還宜興引領白雲天際飛思親未及一年歸洞庭橘熟霜前摘更學兒啼舞綵衣題半間雲蜀嶺廬峰半是雲青城樵者受氤氲晨霑席上㸔山笏暮濕窗間辟蠧芸閒逐蛟龍行雨去靜棲鸞鶴與松分更從真訣披三素莫把詞章繡五紋寄李公平御史姓名不待覆金甌已作人間第一流烏府先生來建業玉堂學士下瀛洲十年麗澤從諸老一日清風動五侯江海相知惟賀監㡬時醉解驌驦裘題東閣為上官作歳晚溪山倚東閣夜深風雪夢西湖不同何遜當年興獨玩先天太極圖題耕樂堂為許生作畎畆區區樂半生此生惟有慕莘耕豈同巢父終忘世獨愛龎公不入城笑我窮經為左計呼兒擊壤慶西成烹雞饟黍年年約莫道儂家是許行送王文敏重入京師漢室徴賢日王褒有軼材風雲行獻頌江海更􅋦杯安得雙金贈真同萬里廻皇猷能黼黻應不數鄒枚聖恩頒漢詔星使遍堯封應聘多耆碩更張法祖宗金臺明易水玉仗過居庸未遂觀光願清時不易逢題萱蕙同芳圖風光轉蕙及萱花一笑相逢子墨家不采幽香同結佩空教零落怨年華題魯彦康所藏范寛山水手卷㸔雲終日坐蒼苔溪上千峰紫翠堆種竹人家臨水住抱琴客子過橋來欲書盤谷先生序更把潯陽處士杯他日卜居能似畵草堂題作小蓬萊松雪竹石蘭鳯皇栖老楚琅玕白雪猗蘭一再彈空憶玉堂聽雨夜不知翠袖倚天寒松雪竹松雪齋前見此君白鷗波冷翠紛紛蕭騷不是湘江雨要眇還成楚峽雲遊冷泉亭絺綌生凉坐酒醒暫于樹底㺯清泠煑茶博士那知味覔句賔王尚有靈石上白雲終日濕洞中瑶草四時青我來不宿空歸去夜夢廬山潄玉亭鷺鷥手卷摩詰畵成詩益妙夫差鼓破事全非雨蒲烟篠寒沙暝無數連拳㡬箇飛顯應觀書事樓觀窺江郭新晴撲紫嵐深林疑有雨積溜響空潭素髪何由變忘機庶可叅明朝重與子來此潄餘酣送方叔髙之泉州南安尉枳籬茅屋共桑麻韓偓詩中是縣衙政喜簿書辭帥府久勞弓劍慰山家海州風靜來犀象岩洞巢空竄虺蛇有詔令民皆復業繞城新植刺桐花次韻李克讓過丘以敬仁夀寺讀書所先生讀書處庭草似人長烟郭萬家畵風濤六月凉問竒能載酒習靜自焚香暫此招提宿非因事覺王送人之金陵之子好文翰扁舟東適吳金陵龍虎氣六代帝王都明月采驪頷朝陽鳴鳯雛畏途方酷烈善寳百金軀畵馬西風㺯影四蹄霜背有連錢匹練光神駿何曾受羈􅎗蕭蕭想見華山陽送海東之一言不合便投劾肯負平生萬卷書南省幕中歌鳯鳥西風江上鱠鱸魚翩翩去就為時重落落逢迎與世踈想得扁舟明月夜夢魂唯是到匡廬早起四壁蟲聲一樹風滿樓月色五更鐘起來但覺東方白草上瀼瀼露氣濃八月十五日蔡忠伯楊亷夫司令袁鵬舉賔王陸孔昭同登江樓觀潮以李白浙江八月何如此潮似連山卷雪來分韻賦詩限七言律期而不至者楚石長老吕彦孚白馬濤頭駕素車至今猶自詫靈胥千年元氣淋漓後八月長風震盪初顧兎盈虚端不爽神龍變化竟何如須臾日落江明練東逝滔滔泄尾閭江月松風集卷十
