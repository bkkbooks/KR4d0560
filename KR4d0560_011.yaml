body:
  text: 江月松風集卷十一元錢惟善撰題遺安軒為吳江朱君竹子誠作子孫何以遺方寸繫安危穫稻水雲裏讀書風雨時寜無五湖興應有鹿門期遲我來看竹彈琴更賦詩空隠子以燈花寫草蟲人物葢用雲巢家法且書坡翁題雍秀才八詩于右戲把燈花幻草蟲世間筆墨詎能同雲巢家法坡仙語令我披圖悟色空雪岩為管公賦金華洞天古時雪光彩射人猶栗冽仙翁縛屋岩之阿披氅逍遥㺯松月或云髙處産瑶琨晝夜照耀天無昏千年水精化為石壁立萬仞誰能捫仙翁胸中有丘壑故倚孱顔若栖鶴天風吹開白雲去等間見此青岝㠋云胡玉氣生氤氲是中四月方知春百年富貴一餉爾氷山未必同吾真玉宇瓊樓每欲往琪樹瑶花嵗應長更于何處覔此境冷逼衣裳成夢想手中笑把雙芙蓉飲似氷壺驂白龍覺來問我何所見彷彿瀑布香爐峰寄吕彦孚覔句隠烏几談經坐虎皮乾坤秋已半風雨夜何其聚散偏相憶窮愁不自悲但令交有道莫惜鬂成絲李君彦何道衡雨中見訪留宿以今日重來白首分韻得今日二字各賦詩二首以記之二子來相訪空堦落葉深江山雖異縣風雨忽同衾四十未聞道二毛何見侵文章須邁古情好祗如今薄暮故人來豪談極真率孤燈明簡書杯酒薦梨栗雨聲正蕭蕭風條尤瑟瑟對床不能寐相期復何日楊亷夫司令以詩美杜清碧先生逹兼善郎中率吾曹同賦獨慕崆峒鄒道士共稱京兆杜徵君鍊丹室裏金銀氣懐友軒中虎豹文何處同舟追李郭平生講道擬河汾明年約我武夷去共寫松風㺯白雲近傳水北幽居好鞍馬相尋多出城説易長懐白岩老題詩只寄丹丘生郎官幕府擅文藻科目人才繫重輕憶昨同舟過湖日風篁聲裏問龍泓放猿為魯至道禮部侍郎作飛來峰下又成羣好事誰如魯使君金鎻曾經湘岸雨黑衣猶帶峽山雲不應泪落舟中聽只許禪餘石上聞千尺長松挂孤影夜深澗月白紛紛送羅敬之侍親之長林并柬樂清尉丘長卿送子之何許窮年雨雪深風橋連越嶠島嶼帶長林煮海惟深計趨庭寄好音近聞樂清尉無事亦鳴琴庚辰臘日大雨雪至明年元日承普安善卿劉環翁賽甫思誠韓思學四卿元洎袁鵬舉朱子昭同酌抵暮而歸三日納復禮謂當作詩以紀因綴七言律一首舊歳新年雨雪飛風來西北逞寒威𤣥㝠未授青皇令黑夜還同白日輝羣玉山川迷畵舫五雲宫闕㸃朝衣衆賔盡醉成清賞為埽柴門一尺圍四日吕謙甫吕彦孚昆仲相招飲家園玉樹庭堦好弟昆雪晴開讌勝梁園已呼翠袖歌金縷肯使烏巾負緑尊節近燒燈田蟹大春生坐褥埜熊温罷歸蠟屐愁氷滑慙愧吾親重倚門至元六年庚辰十又二月庚辰朔己亥大雨雪戊申復雨雪至七年辛巳正月朔旦己酉雨雪大作癸丑甲寅復大雪因賦詩以記城郭雪深三四尺窮谷大川那可量虎狼憑威肆貪虐雀鳥凍死何哀傷海中三山失顔色堯時十日無晶光梅花相㸔夜忘寐門外不知回野航雪晴次丘以敬韻雪深難覔故人家曉日初翻城上鴉睡覺只驚窻户白一簾晴響滴簷花王松友索賦吾聞王子喬昔與赤松友若人今復見茯苓千嵗夀家居金華縣初平時邂逅十年走燕趙功名亦何有南歸獲至寳珠玉燦雙袖願言山水好松花釀春酒抱琴弦松風寧有聼者否終當賦逺游又别山中叟素華臺在龍虎山太𤣥子觀月之所環珮鏘鏘月下聞層臺髙起離人羣天香散滿三珠樹灝氣凝成五素雲辟穀相從赤松子吹簫唯向玉晨君要餐瓊屑渾無計願事吳剛乞斧斤送伍景麟杞從龍歸東平兩賢瑞世即龍麟頭角峥嶸邁等倫千里同舟求聖學㡬時聨璧貢王賔山中夜月思丹桂天末凉風咏白蘋博盡黄金書萬卷却歸潁上理絲綸極目亭四首南望富春渚雲山縱復横野雲低驛樹秋色帶州城千古共登覽一江空戰爭海門遥見白應是晚潮生遐覽東南際清秋樹木稀天空孤鳥沒江瞑一㠶歸月出金天豁山藏翠雨微道人能伏虎深夜亦開扉五色雲中百尺梯憑髙但覺鳥飛低江山今古何嘗異氣候朝昏自不齊地近天河垂象緯雨交海日見虹霓竹房開在禪栖處待我重來改舊題南北峰來几案前朶雲飛動絶攀縁金烏曉浴扶桑國白雁秋横落木天林壑千重還紫翠江湖一色歛風烟尋常引領爭如雪玉宇瓊樓更覺仙次韻吕彦孚秋懐二首逺樹秋聲細髙樓月色多頭顱成老大勲業轉蹉跎漫憶袁臨汝空懐馬伏波好天如此夜無酒奈君何金天垂月露秋氣入窗紗最戀姜肱被頻過賈島家無官寧夢鹿有妾解塗鴉深夜㸔書喜燈明眼未花芙蓉白描手卷秋花石上玉狻猊金尾翛翛歛四蹄零落舊時宫女扇撲螢曾見畵闌西夀諼堂夀母堂前多樹諼斑衣時復奉輕軒宜男花發春還夏拜慶圖成子又孫人好巢烏當屋宇客來剪髻助盤飡索詩已買東歸棹昨夜連環夢倚門石上枯蓮上人琴名君不見零陵湘水西石上枯桐一千尺朝陽無復鳯鸞鳴竅中猶有蛟龍蟄震霆一夜烈火焚賞音邂逅超道人斵作三琴號神品鍾焦尾斯其倫好事相擕東入海蓮師獲之極珍愛世經喪亂恐若失古製宛然遺韻在南風吹斷蒼梧隂如此良貭那易尋凴誰更寫栁州賛即是當時霹靂琴㽔賔鐡君不見朱雀大尉家曹鎠弟子善琵琶平泉别墅朗談處有物跳出青蓮花月白風清縱幽賞視之乃是鐵方響辟如以鐸求黄鍾宫聲相應無差爽琵琶雖妙爭如琴雅鄭未必無知音蓮師之談過聰頴間以鐵寫禪之心請師試鼓㽔賔調定有鏘然躍深沼琴兮鐵兮何要妙我當往和蘇門嘯翠雨亭亭子蕭然十畆秋晴光摇曵屋簷頭楚雲冉冉文竿濕山雨娟娟翠黛愁公子玉樓春夢覺野人黃卷夕隂浮月明更鼓湘靈濕鸞鳯飛翔卒未休十月朔旦錢良貴來訪已而袁鵬舉亦至遂同登三茅觀過清逺堂然後歸被髪真君來武當凛然生氣坐髙堂一池雨浸青銅色半壁雲銷寳篆香落葉空林人往返古松流水鶴回翔著書若許依丹竈鷄犬相從歳月長江月松風集卷十一
