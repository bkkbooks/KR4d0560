body:
  text: 江月松風集卷九元錢惟善撰送趙季文之官湖州分韻得蘇瓌潭憶昔蘇瓌墮此潭至今遺事作清談雲深不雨千峰潤風定無波一鏡涵鵷鷺班行終可造蛟龍窟穴暫湏探前身恐是烏程尉罨畵溪山性所躭和季文山齋早春方壺元不離人間倚遍東風十二闌煙雨樓臺春似畵水雲窗户晝生寒遥知洗鼎煎茶待定許敲門借竹看醉後石橋花爛熳翠禽啁唧在簷端落梅風細小窻寒石上餘香㸃㸃斑不惜壺觴千日醉只愁庭舘一春閒澗雲生白元非雨江樹排青更有山擕取畵圖溪上去鶴聲應到夢魂間與馬彦初日暮遊興元寺河上逺山凝紫白雲歸髙處時來攬翠微流水野梅春寂寂壞城宫樹晚依依雪晴孤雁過江去林暝亂鴉盤塔飛地下修文呼不起眼前殊覺故人稀題子昂疎竹逺山圖玉立湘江濶東風不自持巫山何處是春雨埽蛾眉翠竹靈壁圖江上聞瑶瑟雲端擁翠旗楚王空有夢那得見貞姿客樓即事未能辭市井那得老江湖不伐田家樹仍還合浦珠客窻春雨靜親舍暮雲孤時復登樓望青山入座隅送姚德莊之淳安縣學教諭少壯功名擬彀中誰憐短褐尚飄蓬山深縣郭民風儉烟濕㕑庖學廩豐弟子讀書庭草緑鄰人擕酒野花紅煩君為問青溪友獨喜諸洪有兩龔送中瑞師典簿楊元城還京師上國皇華使中宫符寳郎每瞻天日表長憶水雲鄉御榻先馳貢賔筵逺送將壯游誰得似閭里共輝光湖上山居好天涯驛騎遥三年兩奉使千里又還朝江樹迎潮立林花避雨飄多情那忍别剪燭坐春宵送方以愚赴銅陵縣尹參軍重作宰才美獨能兼首為詢彫瘵仍當舉孝亷柳隂春繫馬山色書垂簾見説銅陵郡編氓盡聳瞻題清暉亭叚家亭子近湖山紫翠横從几案間畵省歸來林壑暝黃庭臨得簿書間花邊著綵從兒戯竹下擕琴送客還不獨詩懷似靈運白雲相對拄魚斑又鄴侯新第宅何氏好山林賸醉江南酒閒題溪上衿池春圓草夢庭午直槐隂康樂湖中作令人誦到今二月望日與吕彦孚錢良貴方雲器過龍華寺㸔桃花未開興盡而回二月龍華寺桃花寒未開千峰間白日一徑亂蒼苔訪舊山僧化啼春野鳥哀前朝遺跡在燕麥在禖臺送上清員外薛𤣥卿歸瓊臺詩名早已繞京華奉使南乗貫月槎臺上風含蒼玉佩洞中春老碧桃花歩虚縹緲聨珠斗靈閣嵳峩逼紫霞築舘緱山誠有約百年須啖棗如𤓰聽松復羡陶貞白嚙蕋兼懐郭景純犬吠瓊林疑有雪鶴歸滄海竟無塵層臺恍若崑山頂仙浦遥通析木津我欲把詩題石壁天風何日駕麒麟題任月山畵馬神駿蕭蕭白黑文圉人調習未能馴五陵年少黄金絡騎向長安不動塵晚雨過白墖宋宫傳是唐朝寺白塔崔嵬寢殿前夏雨染成千樹緑暮嵐散作一江烟蒼苔門外銅鋪暗細栁營中畵角傳寂寞葫蘆宫井畔野人拾得舊金鈿送慶雲壑西堂之揚州化縁白雲一壑包山臥偶訪檀那作逺行天上賜衣披紫鳯雨中投寺聽華鯨風濤此日長江險梁棟明年大厦成已誦法華踰萬徧早回天竺話三生送王舉之入京就柬樵谷短衣匹馬佩吳鈎欲寫闗河萬古愁射雁秋風髙紫塞聽鶯春色滿皇州黃塵驛路三千里白玉京城十二樓無酒送君懷抱惡過江為覔故人舟過寅賔亭寅賔亭上聽松聲夏木叅天緑染成千歲鶴歸城郭是四更雞動海波明每逢野客分雲坐慣引山童踏雪行載酒誰能忘勝槩賦詩我獨寄幽情江雲劉先生挽章先生家在錦溪村冠盖相從似鹿門亡國敢言邊塞急清朝應見典型存京庠事往嗟誰及鄉校官卑道益尊冉冉白雲留不住山中何處酹貞魂送藍信之省掾滿歸北上豫章人近㸔江月正懐思逺望燕雲又别離南省共稱三語掾東膠猶説五經師龍泉光彩干牛斗金匱文章刻鼎彛追逐相君行樂地西湖佳處總新詩思雲軒為汪㑹之以敬父子作乃祖號雲留先生思雲者思其祖也兒時不識雲指雲謂為天愛雲及少壯賦詩輙成篇靄靄春雲好英英秋更鮮望之不可即逝將挾飛仙朅來錦溪上留與髙人眠髙人去弗返子孫更綿綿絃琴松桂裏日與雲周旋見雲思祖父心旌愈懸懸九京不可作抱雲為􅏰然雲或爾飄散爾無雲棄捐帝鄉太清境親舍落日邊嗟余平生懷蹉跎成暮年待月亭廣寒宫殿海雲遮坐聽譙樓度鼓撾何處香飄丹桂子暗中光湧白蓮花莫言清景昏難見正想高輪曉易斜塵世能逢此良夜狂歌起舞醉流霞玉簷馬為彦孚作堂上讀書春晝長時聞簷馬動丁當空中環珮聲髙下風裏鸞和勢激揚遲似渇烏傳玉漏清于顧兎搗𤣥霜特懸雅樂今餘㡬愛此自然宫與商蓬萊贈天目周上人慣聽黄梅嶺頭雨却卧青蓮峰頂雲手結草菴終作住身披芰製不曾焚六時漏學廬山刻十丈花從太華分見説上人無所染定中日日對南薰七月旦日與吕彦孚錢良貴拉袁鵬舉游湖值風雨聨成口號泛湖此日故人期一葉扁舟任所之雲霧兩峰青帢幘波濤萬頃碧琉璃豈同袁紹飲河朔恰似岑參遊渼陂醉裏不愁風雨至只疑昏黑有蛟螭芰製荷衣六月寒清氷𤓰果設杯盤棹歌浪湧飄毛髪談麈風生出肺肝白雨滿湖山不見紅裙入坐酒都乾潢汙歸路沒人膝須記扁舟此日懽錢子雲有二齋號風雲可月索賦道人燕坐讀楞伽童子燒香更煮茶雪月四簷春滿室夢中何處覓梨花凉生石壁靜無燈窻户微明月已升散髮夜深松影裏滿身風露蹋缺氷送陳乗彛代父回台城夀祖母蒼江兩岸赤城霞十日籃輿坐到家池上稱觴夀王母蟠桃開遍漢時花次陸孔昭韻寄葉子中白雲南望日思親牛斗髙連析木津懐想漫馳千里夢飛騰不負百年身讀書異土寧無友積徳名門尚有人見説中朝多好事盡開賔閣致儒珍江月松風集卷九
