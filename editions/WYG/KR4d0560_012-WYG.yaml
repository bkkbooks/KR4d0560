body:
  text: 江月松風集卷十二元錢惟善撰漁村意丙穴漁來江盡頭𤣥真卜築更深幽對門燈火三家市何處烟波萬里舟明月竹枝揚子夜西風木落洞庭秋棹歌一曲閒來往指㸃儂家鸚鵡洲芭蕉室為吳江上人賦手種芭蕉㡬見春緑隂繞屋不生塵能書懐素題詩徧到寺昌黎聽雨頻覆鹿隍中誰辨夢狎鷗波上共觀身扁舟欲過維摩室仍約華陽説偈人夜坐志喜母在髙堂兒在旁燈前補綴舊衣裳移居獨喜親年徤得句空歌子夜長千里鴻飛半江月四鄰誰和滿天霜翛然牀榻如僧舍紙帳梅花入夢香松花石徂徠之松㡬千尺千歳之餘乃成石棟梁竒材學尸解幻作萇𢎞血華碧虵鱗剥落霜蘚痕茯苓不見心為煩耳邊無復聆天籟醉裡直欲搘雲根漆身未信青龍化鐵色真同𤣥處卧日莫遇爾終南下飛將彎弧那敢過或疑織女曾支機又云恐是天星堕東老家富美園池於此列坐彈琴棋閉門枕流隔江雨蒼官前來夢中語若非黄石定赤松穀城山下還相逢賦狐白裘送余仲懐歸歙珍裘非一腋價重兩驌驦輕疑紫貂缺粲若銀鼠光相徳推晏子客計侮秦王若人不復見送爾意茫茫翌日同袁鵬舉過定香橋訪隠者不遇誦經聲隔竹林聞知有禪房逺俗氛野水菰蒲藏小艇寒烟樹木翳斜曛雨花臺古龍歸井落月廊深犬吠雲不見故人歸去晚扁舟重過雪紛紛楊隠君挽詩君諱亮字明叔上饒人其子觀登至順二年進士第授饒州録事再授翰林撿閲而君卒學士揭公志其墓銘章讀罷泪如波髙士云亡奈若何身入風濤親在念恩沾雨露子登科明經數世傳家學㑹塟千人息巷歌昨日西樓遊宴處佳城欎欎枕松蘿一峰晴雪石名醉倚崔嵬夢剡溪覺來翻訝衆峰低孤標想見天山北萬里飛來蜀國西每怪珠光含霽月不知玉氣吐晴霓風流欲喚坡仙起雪浪齋中共品題送熊元成回豫章栁梢昨夜東風起吹破官河一尺氷太史藏書探禹穴謫仙沽酒醉金陵斗間雙劒千年見月下孤舟萬里乗歸去故山重著述洛陽紙價為君增元日立春長安日近仰楓宸萬國衣冠拜一人北斗轉杓行木徳東風吹暖報花神傷時感物中年境送故迎新半夜春明日樂遊珠翠出寳坊香拂鈿車塵杜録事挽詩公諱輝字輝卿其先飛狐人曽為平陽録事百姓號杜父調真定録事君子謂有古循吏風遷京畿倉監以疾卒年四十九妻胡氏傷公之歿致疾而死合葬雲中武周山其子允為嘉興崇徳同知甘泉從幸有揚雄曾屬時巡作上宫豈弟化民真杜父雍熙遺俗變唐風猶聞天上中書薦已覺人間大夢空千里並喪能合塟㝠㝠魂夢入雲中人日喜晴分韻得人字雪盡東風起城邊栁色匀百年同是客此日喜逢人煖泛波間緑香飄霽後塵從今追勝賞莫負六橋春送張文郁考滿北上張君昔掾行省幕起身六曹騰薦鶚玉壺風露濯心胸寳劔塵埃歛鋒鍔家居東魯風俗淳夢入五湖波浪惡閉門官况政自佳三年抱病麾杯杓今君考滿將北歸俸廩蕭然一如昨初自都下來江南有孫偕行訪文學前師李氏後師丘中間從余究伊洛授書不似童子記哦詩欲追古人作君今歸裝盛籖軸擕孫還鄉罄囊槖况當英妙力孤苦勿嗜紛華􅅓澹薄學海須要涵百川書櫉無但支兩脚麗澤相資聖所貴他山之石可為錯豈無樽酒報殷勤聊寫兹懐慰離索正月十六日與劉生雪中過三茅觀天風吹放氅疑到玉皇家不見赤松子唯逢蕚緑華春回丹鼎火凍折使星槎明月㸔晴色江山景又加顧碧蟾先生挽詩壯歳歸來即養恬西山㸔雨捲朱簾底須待詔登金馬祗欲求仙事玉蟾德種爭㸔三子秀著書已似一夫潜廣陵城外新營𦵏欲酧先生涕泗霑送帖君澤歸湖廣撾鼓發船歸武昌杏花驛路早春光侍親河泊新之任為客乾坤總是鄉絶唱郢中傳白雪濯纓江上有滄浪登臨何處偏懐古落日蘭亭思渺茫和王仲仁見寄髪齒已如許江湖何所之忽收前月信未和去年詩至寳懐雙璧新愁理亂絲為親能捧檄此意獨余知訪逺山觀師云寂已隔歳矣感而賦詩忽到觀公院蕭蕭影在帷山林曽㡬見塵世漫多為不作緇衣别猶聞説偈辭逺山何黤慘揮泪日斜時三月初五日送劉師魯先生殯陸志尹孔昭昆仲招飲湖船緑楊多處小汀洲適意人生勝宦遊雙槳微風文鷁動千波倒影白虹流遺珠爭羡雲間陸荷鍤空懐地下劉時復湖天文字飲醉鄉何必更封侯聞彦孚後園牡丹盛開與錢良貴有賦詩之興因為長句以記其美池舘深深賦牡丹繁枝開徧未春殘鬰金香染芙蓉帳藥玉杯傾瑪瑙盤䕶日兼防風雨至娛親時挈子孫㸔每從綺席陪清賞漫詫楊家百寳闌三月望日與袁鵬舉賔王同遊北山東山神仙宫諸勝處訪喜鵲寺茂上人不遇泛舟而回自憐躭句平生樂時得尋真半日閒白白楊花迷道上青青梅子落林間三千歌舞如春夢四十飛騰未老顔喜鵲寺中因舉訪前身記得是香山雨後登吳山過城隍廟眺望偶向吳山髙處望凄凉猶是覺繁華百家香火祠神宇二月笙歌賣酒家𣺌𣺌風㠶來海島㝠㝠江樹接烟沙倚闌貪㸔西湖上古木荒城日又斜新正試筆次韻清溪野史髙作以下續集田家欲雨唯㸔月人日多隂重卜年髩雪紛紛梳易落燈花冏冏笑堪憐擬尋夢草池邊句靈運即買浣花溪上船少陵風俗再淳民樂業會㸔斗米直三錢題倪雲林畵曲江老人喜雲林之畵與詩不徒作葢識其人之賢故次其韻以發清賞太丘遺澤被諸孫東蔡深居雨外村濁水摩尼因見地好山罨畵正當門得錢賸買詩千卷留客時沽酒一尊名利區區等春夢貪夫未覺古槐根缺題幽人好樓居層梯離塵垢俯瞰江練澄仰觀雲幕收須臾獨憑闌萬象森列宿先得海底月飛光入窻牖犀然半渚分珠吐蜯胎剖吹笛和龍吟金蟇落吾手舉杯縱鯨吸玉兎墮吾口天髙豁懐抱露下濕衣袖清風滿乾坤識此㡬人否豈惟樓得之吾心月自有對影舞且歌太白千古友題風雨䕶嬰圖焚香敬誦昔人詩如遇空山雷雨垂老婦䕶兒驚掩耳欲歸無語先茅茨一作零陵燒作斵琴枝梅道人墨菜晚菘香凝墨池濕畦菜摘盡春雨泣梅花菴中吳道人寫遍羣蔬何徳色怪我坐客寒無氊牀頭却有買菜錢四時之蔬悉佳味乃知此等吾尤便有客忽擕畵卷至一笑落筆南風前題破窻風雨一燈風雨寒窻破讀書不知秋怒號恍如扁舟在江海但覺四壁皆波濤對床髙卧無此客倚劍長歌空二毛曉㸔庭樹故無恙千峰雲氣落青袍題松雪墨竹小橋流水雪晴時曾折幽芳寄所思明月觀深春夢逺玉堂仙客寫横枝題趙彦徵畵玉堂學士研猶存三絶名家尚有孫何處有山如此畵便將歸計問田園送賈元英之照潭照潭遥望九華山弓馬蕭蕭日暮還夢裡無題唯寄内胸中有䇿欲平蠻落花閉户眠黃犬明月開籠放白鷴絳灌何曾輕賈誼早隨鵷鷺入朝班清送齋神仙宫府曾為吏一日東風即棹頭太白豈惟凌鮑謝元卿只合友羊求門前種樹青連屋湖上聽潮白滿樓遥憶五經名隠地峨眉髙聳蜀天秋江月松風集卷十二
